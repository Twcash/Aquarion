sector.aquarion-dried-riverbed.description = A bottleneck in Crux' logistic network.Destroy their convoy to break their hold over this region. Preliminary scoutings have confirmed the presence of tier 5 units. Prepare accordingly.
sector.aquarion-frigidShores.name = Frigid Shores
sector.aquarion-frigidShores.description = A crux naval strike team has blockaded this waterway, preventing access to the dockyard complex. Destroy and move on.
