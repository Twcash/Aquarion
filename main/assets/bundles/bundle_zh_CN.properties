block.aquarion-sealed-distributor.description = 防水分配装置，将筛选物品向前输送，其余物品向两侧输出。
block.aquarion-mass-distributor.name = Mass Distributor
block.aquarion-mass-distributor.description = A dubiously large water-tight router that distributes input items to 15 output directions equally.
block.aquarion-sealed-junction.name = 密封交叉口
block.aquarion-sealed-junction.description = 作为两条交叉传送带的连接桥。
block.aquarion-sealed-unloader.name = 密封卸载器
block.aquarion-sealed-unloader.description = 从后方结构中卸载物品。
block.aquarion-sealed-sorter.name = 密封分拣器
block.aquarion-sealed-sorter.description = 防水分拣装置，将筛选物品向前输送，其余物品向两侧输出。
block.aquarion-sealed-inverted-sorter.name = Sealed Inverted Sorter
block.aquarion-sealed-inverted-sorter.description = A water-tight sorter that outputs the filtered items forward and any other item to the sides.
block.aquarion-sealed-overflow.name = 密封溢流传送带
block.aquarion-sealed-overflow.description = 防水溢流传送带，当输入端对面无法接收物品时向两侧输出。
block.aquarion-sealed-underflow.name = 密封欠流传送带
block.aquarion-sealed-underflow.description = 防水欠流传送带，当物品无法向两侧运输时向输入端对面输出。
block.aquarion-steel-conveyor.name = Steel Conveyor
block.aquarion-steel-conveyor.description = Moves items in massive batches.
block.aquarion-steel-conveyor.details = for when you REALLY need to move items around
block.aquarion-steel-router.name = Steel Router
block.aquarion-steel-router.description = Equally distributes items in three directions from steel conveyors.


