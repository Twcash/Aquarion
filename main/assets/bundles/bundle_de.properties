## SECTORS
sector.aquarion-Ingress.name = Ingress
sector.aquarion-Ingress.description = Your first foray into a new planet. Utilize the magma tap and magma diffuser to get your economy started.
sector.aquarion-Ecotone.name = Ecotone
sector.aquarion-Ecotone.description = With Brine present in this Sector, brine electrolysis can be used for power generation.
sector.aquarion-diseased-cleft.name = Diseased Cleft
sector.aquarion-diseased-cleft.description = The crux have build a bastion in an infested cleft. Take it down.
sector.aquarion-EnsuingTorrent.name = Ensuing Torrent
sector.aquarion-EnsuingTorrent.description = These strange lifeforms seem to be more than a local phenomenon. Local azurite deposits will prove useful as a source for copper.
sector.aquarion-CrystalCavern.name = Crystal Cavern
sector.aquarion-CrystalCavern.description = With no thermal hotspots in the area, new sources of power and resources must be utilized. To this end, the fume engine, drill derrick and towanite reduction will prove useful.
sector.aquarion-Grove.name = Grove
sector.aquarion-Grove.description = Soon the demand for power will outgrow the available thermal heat, but for now it must do. This sector is more overgrown than any before. The buzzsaw is useful for the automated removal of obstacles, but it can not move. Units, however can. Pugnate, or other units of your choice, can shoot down these obstacles, if you tell them to.
sector.aquarion-resurgence.name = Resurgence
sector.aquarion-resurgence.description = A perfect area to get past the orbital defense, our conquest begins here.
sector.aquarion-twinPass.name = Twin Pass
sector.aquarion-twinPass.description = Defunct ruins scatter these wastes. Destroy the crux patrol and move on.
sector.aquarion-erodedCanyon.name = Eroded Canyon
sector.aquarion-erodedCanyon.description = A crux strike team guards this waterway, this waterway is required to access the North Gate
sector.aquarion-fungal-tropics.name = Fungal Tropics
sector.aquarion-fungal-tropics.description = A crux patrol watches over this area, secure and move on.
sector.aquarion-seared-wastes.name = Seared Wastes
sector.aquarion-seared-wastes.description = There is a crux patrol traveling these deserts. Destruction of this patrol is necessary to move forward.
sector.aquarion-floodPlains.name = Floodplains
sector.aquarion-floodPlains.description = Dieser Sektor nähert sich einem stark Verteidigtem Punkt an Interesse.
sector.aquarion-Lagoon.name = Lagoon
sector.aquarion-Lagoon.description = Dieser Ort ist von generellem Interesse und deshalb gut Verteidigt. Adequate Technologie und Strategie sind erfordert.
sector.aquarion-lowlandStrait.name = Lowland Strait
sector.aquarion-lowlandStrait.description = A rogue crux naval patrol has stranded themselves here. Destroy and move on.
sector.aquarion-mountainsideComplex.name = Mountainside Complex
sector.aquarion-mountainsideComplex.description = A crux branch is attempting to re-acquire advanced weaponry in a fortified research outpost. Destroy and move on.
sector.aquarion-riparian-holt.name = Riparian Holt
sector.aquarion-riparian-holt.description = A tight overgrown ravine lies here. Notably, small soil formations are present here. The gerb have us in a chokepoint, we will be attacked from 2 sides.
sector.aquarion-dried-riverbed.name = Dried Riverbed
sector.aquarion-dried-riverbed.description = A bottleneck in Crux' logistic network.Destroy their convoy to break their hold over this region. Preliminary scoutings have confirmed the presence of tier 5 units. Prepare accordingly.
sector.aquarion-frigidShores.name = Frigid Shores
sector.aquarion-frigidShores.description = A crux naval strike team has blockaded this waterway, preventing access to the dockyard complex. Destroy and move on.
sector.aquarion-blastedDockyard.name = Blasted Dockyard
sector.aquarion-blastedDockyard.description = An old home. Currently under siege, this will truly be a challenge.
sector.aquarion-coupled-basin.name = Coupled Basin
sector.aquarion-coupled-basin.description = Crux fortifications support a patrol moving through this area. Secure and destroy the patrol.
sector.aquarion-lakesideLibrary.name = Lakeside Library
sector.aquarion-lakesideLibrary.description = Houses mostly distribution-related knowledge, no enemies are present. It is not required to enter this place.
sector.aquarion-submerged-canyon.name = Submerged Canyon
sector.aquarion-submerged-canyon.description = You have stumbled upon one of their supply routes. Utilize the canyon structure in order to block off the convoys.
sector.aquarion-FeldsparRavine.name = Feldspar Ravine
sector.aquarion-FeldsparRavine.description = Gerbs utilise dead bodies of their soldiers to turn them into soulless mashines. Utilise biotite leaching vessel to gain aluminium and ferric matter
sector.aquarion-brine-plateau.name = Brine Plateau
sector.aquarion-galenafringe.name = Galena Fringe
sector.aquarion-galenafringe.description = A very deep trench with high amounts of geothermal activity. Rich in galena formations.
sector.aquarion-violet-valley.name = Violet Valley
sector.aquarion-violet-valley.description = A valley filled with plenty of spore growths; Varcaud Stalks tower over Brulr Fern,  Brambles and Rel Blossoms. Kol Ferns and Adre Sprigs grow aplenty on the overgrown floor. For as of yet unknown reasons Crux has sent an expeditionary group into this valley. The destruction of this expedition would hinder Crux' plans.
sector.aquarion-frozen-lake.name = Frozen Lake
sector.aquarion-frozen-lake.description = A large proportion of this sector is taken up by a lake. The enemy is likely have a naval presence. Prepare accordingly. There is also a lack of sand here, utilise scrap centrifuges to obtain it.
sector.aquarion-verdant-shallows.name = Verdant Shallows
sector.aquarion-verdant-shallows.description = A region of Tantros where the ocean is particularly shallow. Don't let the seeming tranquility of this sector fool you, Gerb are present.
sector.aquarion-stormy-coast.name = Stormy Coast
sector.aquarion-stormy-coast.description = This sector seems to have near constant raging storms. Land during a calm and prepare. It is recommended to start setting up some shields once the rain starts. 
sector.aquarion-ruined-repository.name = Ruined Repository
sector.aquarion-ruined-repository.description = A repository housing knowledge about drills. Due to it's age, some parts have significantly degraded.
sector.aquarion-icy-river.name = Icy River
sector.aquarion-icy-river.description = Lead burners are helpful to start up your factory, but as you progress you will need more, better, power generation. This sector seems to contain large open brimstone reserves, which are needed for the minium reactor, your first step towards more efficient power generation. It produces significantly more power than lead burners, but it also requires more setup.


