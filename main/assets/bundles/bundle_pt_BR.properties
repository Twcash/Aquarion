ingress-goodLuck = Use 썒[accent] sifões[] para conectar estruturas.[#d24040]\n []썒[accent] Sifões[] acumularão danos ao conter líquidos de alta temperatura, como []썓[accent]Magma[]. []\n[accent]Use []쎐[accent] Piras de reparo[] para neutralizar isso.[]
torrent-azurite = [royal]Azurita[] é um cristal contendo [accent]cobre[], use Extratores de plasma para explorá-lo.\n Use o [accent]Forno de Azurita[] para refinar este recurso.

lakeside-library-failure = Nós nunca fomos feitos para ter sucesso. Mas para preparar o terreno para que você possa.
lakeside-library-power-connect = Blocos que consomem energia (como mostrado pela entrada de ar) não podem se conectar à energia por estarem adjacentes a estruturas consumidoras de energia ou pilões.
lakeside-library-outlet = Tomadas
