block.aquarion-polymer-press.description = Usa calor e pressão extremos para polimerizar o petróleo líquido.
block.aquarion-silicon-oxidator.name = Oxidador de Silício
block.aquarion-silicon-oxidator.description = Reage silício com oxigênio. Produzindo areia.
block.aquarion-arc-furnace.name = Forno a Arco
block.aquarion-arc-furnace.description = Usa voltagem extrema para aquecer a areia. Produzindo silício e oxigênio.
block.aquarion-haze-cracking-unit.name = Unidade de Craqueamento de Névoa
block.aquarion-haze-cracking-unit.description = Usa névoa para refinar petróleo em polímero. Produz amônia como subproduto.
block.aquarion-desulferization-assembly.name = Conjunto de Dessulfurização
block.aquarion-desulferization-assembly.description = Extrai enxofre do petróleo líquido, liberando metano como subproduto. Requer calor para funcionar.
block.aquarion-coal-liquefactor.name = Liquefator de Carvão
block.aquarion-coal-liquefactor.description = Cria óleo sintético a partir de carvão, oxigênio e calor.
block.aquarion-vacuum-freezer.name = Congelador a Vácuo
block.aquarion-vacuum-freezer.description = Refrigera a água impura além de seu ponto de orvalho, forçando as impurezas a se separarem.
block.aquarion-acuminite-degredation-array.name = Matriz de Degradação de Acuminita
block.aquarion-acuminite-degredation-array.description = Desconstrói cristais de acuminita em seus componentes centrais, incluindo estrôncio, alumínio e flúor.
block.aquarion-atmospheric-centrifuge.name = Centrífuga Atmosférica
block.aquarion-atmospheric-centrifuge.description = Separa os componentes do ar com força centrífuga.
block.aquarion-blast-furnace.name = Alto-Forno
block.aquarion-blast-furnace.description = Produz aço a partir de uma grande quantidade de matéria férrica, oxigênio e carvão. A eficiência pode ser aumentada com calor e um refrigerante.
block.aquarion-brine-mixer.name = Misturador de Salmoura
block.aquarion-brine-mixer.description = Produz salmoura misturando grandes quantidades de água e sal.
block.aquarion-electrolysis-vat.name = Eletrolisador Aquoso
block.aquarion-electrolysis-vat.description = Usa eletrólise para separar água em hidrogênio gasoso e oxigênio.
block.aquarion-electrolysis-vat.details = *O oxigênio só é compartilhado na direção da saída de oxigênio, o mesmo para o hidrogênio. A água é compartilhada em todas as direções.
block.aquarion-brine-electrolysis-manifold.name = Coletor de Eletrólise de Salmoura
block.aquarion-brine-electrolysis-manifold.description = Eletrolisa salmoura em componentes mais puros. Tais como cloro, hidrogênio e hidróxido.
block.aquarion-spore-processor.name = Processador de Esporos
block.aquarion-spore-processor.description = Mistura cápsulas de esporos em uma pasta.
block.aquarion-gasifier.name = Gaseificador
block.aquarion-gasifier.description = Aquece pasta biológica produzindo coque refinado e névoa residual.
block.aquarion-ultramafic-refinery.name = Refinaria Ultramáfica
block.aquarion-ultramafic-refinery.description = Mói a Serpentina em seus materiais básicos.
block.aquarion-convection-heater.name = Aquecedor de Convecção
block.aquarion-convection-heater.description = Usa convecção térmica de água para produzir uma pequena quantidade de calor.
block.aquarion-solid-heater.name = Aquecedor de Combustão Sólida
block.aquarion-solid-heater.description = Queima sólidos combustíveis com oxigênio para produzir calor.
block.aquarion-combustion-heater.name = Aquecedor de Combustão Líquida
block.aquarion-combustion-heater.description = Usa o calor residual da combustão líquida para produzir uma pequena quantidade de calor.
block.aquarion-heat-channel.name = Canal de Calor
block.aquarion-heat-channel.description = Transfere calor para os blocos à sua frente.

