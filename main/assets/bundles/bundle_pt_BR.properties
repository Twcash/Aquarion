##PLAYER Power

block.aquarion-solar-generator.name = Gerador Solar
block.aquarion-solar-generator.description = Produz energia a partir da radiação solar. Baterias podem ser necessárias para neutralizar os ciclos planetários de dia/noite.\n [scarlet]Moderadamente explosivo, coloque com cuidado.[]
block.aquarion-advanced-solar-generator.name = Gerador Solar Avançado
block.aquarion-advanced-solar-generator.description = Produz energia a partir da radiação solar e ventos de tempestade. Resistente a ambientes severos, mas é [scarlet] Altamente explosivo.[]
block.aquarion-lead-burner.name = Queimador de Chumbo
block.aquarion-lead-burner.description = Usa a reação oxidativa exotérmica entre o chumbo e o ar para gerar energia.
block.aquarion-hydroxide-reactor.name = Reator de Hidróxido
block.aquarion-hydroxide-reactor.description = Produz uma quantidade moderada de energia ao borbulhar [violet]Hidróxido[] em [blue]água[]. \n Os subprodutos são considerados desnecessários para as nossas missões, e portanto, serão despejados no ambiente.
block.aquarion-minium-reactor.name = Reator de Zarcão
block.aquarion-minium-reactor.description = Usa calor da névoa para degradar \ue982 [#e4543c]zarcão[], permitindo que o oxigênio se ligue ao enxofre e à água. Produzindo \uf837 [#8c7fa9]chumbo[] e vitríolo no processo.
block.aquarion-turbine-dynamo.name = Dínamo de Turbina
block.aquarion-turbine-dynamo.description = Produz uma quantidade moderada de energia girando uma turbina com [white]Névoa[] pressurizada.
block.aquarion-petroleum-engine.name = Motor a Petróleo
block.aquarion-petroleum-engine.description = Consome uma grande quantidade de petróleo líquido e oxigênio gasoso para converter a força de combustão química em energia.
block.aquarion-fume-engine.name = Motor a Vapores
block.aquarion-fume-engine.description = Produz uma quantidade moderada de energia a partir da combustão de [tan]Vapores[]. [scarlet]Altamente explosivo.[]
block.aquarion-pylon.name = Pilão
block.aquarion-pylon.description = Conecta energia a certas estruturas. Não pode ser conectado a nada que consuma energia diretamente.
block.aquarion-pylon.details = P.S: ele se conecta diretamente às baterias.
block.aquarion-outlet.name = Tomada
block.aquarion-outlet.description = Transfere a energia conectada para o bloco à sua frente. Necessário para estruturas que consomem energia. Vários podem ser necessários devido ao rendimento limitado. \n Consumirá energia continuamente mesmo se a estrutura suprida estiver desligada.[]
block.aquarion-energy-bank.name = Banco de Energia
block.aquarion-energy-bank.description = Armazena uma minúscula quantidade de energia.
block.aquarion-capacitor-bank.name = Banco de Capacitores
block.aquarion-capacitor-bank.description = Armazena uma quantidade moderada de energia. Não pode ser conectado a construções relacionadas à energia por proximidade.
block.aquarion-ion-battery.name = Bateria de Íons
block.aquarion-ion-battery.description = Armazena uma grande quantidade de energia. Não pode ser conectado a edifícios relacionados à energia por proximidade.
block.aquarion-heat-engine.name = Motor Térmico
block.aquarion-heat-engine.description = Usa calor geotérmico para produzir energia elétrica. Produz escória como subproduto.
block.aquarion-basic-heat-exchanger.name = Trocador de Calor Básico
block.aquarion-basic-heat-exchanger.description = Ferve água com calor externo, produzindo uma pequena quantidade de energia com calor residual. Pode explodir se o vapor atingir níveis críticos.
block.aquarion-singularity-reactor.name = Reator de Singularidade
block.aquarion-singularity-reactor.description = Consome qualquer tipo de item para produzir energia. A energia gerada é proporcional à quantidade de itens inseridos.

