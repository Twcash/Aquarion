crystal-caverns-battery = Como a produção de energia\nnão é totalmente estável,\né recomendado\nutilizar baterias para\narmazenar a energia.
ingress-welcome = Isto é[cyan] Tantros[]
ingress-decon = Comece desconstruindo as estruturas [#655a5a]Abandonadas[].\n[accent]Desconstruir estruturas devolverá todos os recursos.
