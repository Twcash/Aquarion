block.aquarion-sealed-inverted-sorter.name = Classificador Invertido Selado
block.aquarion-sealed-inverted-sorter.description = Um classificador à prova d'água que envia os itens filtrados para frente e qualquer outro item para os lados.
block.aquarion-sealed-overflow.name = Porta de Excesso Selada
block.aquarion-sealed-overflow.description = Uma esteira de excesso à prova d'água, envia itens para os lados se o lado oposto da entrada não puder mais aceitá-los.
block.aquarion-sealed-underflow.name = Porta de Falta Selada
block.aquarion-sealed-underflow.description = Uma esteira de falta à prova d'água, envia itens para o lado oposto da entrada se não puderem ser transportados para os lados.
