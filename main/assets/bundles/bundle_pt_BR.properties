## SECTORS
sector.aquarion-Ingress.name = Ingresso
sector.aquarion-Ingress.description = Sua primeira incursão em um novo planeta. Utilize o coletor de magma e o difusor de magma para iniciar sua economia.
sector.aquarion-Ecotone.name = Ecotone
sector.aquarion-Ecotone.description = Com Salmoura presente neste Setor, a eletrólise da salmoura pode ser usada para geração de energia.
sector.aquarion-diseased-cleft.name = Fenda Doente
sector.aquarion-diseased-cleft.description = Os crux construíram um bastião em uma fenda infestada. Derrube-o.
sector.aquarion-EnsuingTorrent.name = Torrente Resultante
sector.aquarion-EnsuingTorrent.description = Essas estranhas formas de vida parecem ser mais do que um fenômeno local. Depósitos locais de azurita serão úteis como fonte de cobre.
sector.aquarion-CrystalCavern.name = Caverna de Cristal
sector.aquarion-CrystalCavern.description = Sem pontos de calor na área, novas fontes de energia e recursos devem ser utilizadas. Para esse fim, o motor de vapores, a torre de perfuração e a redução de towanita serão úteis.
sector.aquarion-Grove.name = Bosque
sector.aquarion-Grove.description = Em breve, a demanda por energia superará o calor termal disponível, mas por enquanto terá que servir. Este setor está mais coberto de vegetação do que qualquer outro antes. A serra circular é útil para a remoção automatizada de obstáculos, mas ela não pode se mover. Unidades, no entanto, podem. Pugnate, ou outras unidades de sua escolha, podem derrubar esses obstáculos a tiros, se você mandar.
sector.aquarion-resurgence.name = Ressurgimento
sector.aquarion-resurgence.description = Uma área perfeita para passar pela defesa orbital, nossa conquista começa aqui.
sector.aquarion-twinPass.name = Passagem Gêmea
sector.aquarion-twinPass.description = Ruínas desativadas se espalham por esses ermos. Destrua a patrulha crux e siga em frente.
sector.aquarion-erodedCanyon.name = Cânion Erodido
sector.aquarion-erodedCanyon.description = Uma equipe de ataque crux guarda esta via navegável, esta via navegável é necessária para acessar o Portão Norte.
sector.aquarion-fungal-tropics.name = Trópicos Fúngicos
sector.aquarion-fungal-tropics.description = Uma patrulha crux vigia esta área, garanta a segurança e siga em frente.
sector.aquarion-seared-wastes.name = Ermos Calcinados
sector.aquarion-seared-wastes.description = Há uma patrulha crux viajando por estes desertos. A destruição desta patrulha é necessária para avançar.
sector.aquarion-floodPlains.name = Planícies de Inundação
sector.aquarion-floodPlains.description = Este setor está se aproximando de um ponto de interesse altamente defendido.
sector.aquarion-Lagoon.name = Lagoa
sector.aquarion-Lagoon.description = Este ponto de interesse é altamente defendido. Tecnologia e estratégia adequadas são necessárias.
sector.aquarion-lowlandStrait.name = Estreito de Planície
sector.aquarion-lowlandStrait.description = Uma patrulha naval crux rebelde encalhou aqui. Destrua e siga em frente.
sector.aquarion-mountainsideComplex.name = Complexo da Encosta
sector.aquarion-mountainsideComplex.description = Uma ramificação crux está tentando readquirir armamento avançado em um posto de pesquisa fortificado. Destrua e siga em frente.
sector.aquarion-riparian-holt.name = Bosque Ribeirinho
sector.aquarion-riparian-holt.description = Uma ravina estreita e coberta de vegetação fica aqui. Notavelmente, pequenas formações de solo estão presentes aqui. Os gerb nos encurralaram em um ponto de estrangulamento, seremos atacados por 2 lados.
sector.aquarion-dried-riverbed.name = Leito Seco do Rio
sector.aquarion-dried-riverbed.description = Um gargalo na rede logística Crux. Destrua seu comboio para quebrar o controle sobre esta região. Patrulhas preliminares confirmaram a presença de unidades de nível 5. Prepare-se de acordo.
sector.aquarion-frigidShores.name = Costas Frígidas
sector.aquarion-frigidShores.description = Uma equipe de ataque naval crux bloqueou esta via navegável, impedindo o acesso ao complexo do estaleiro. Destrua e siga em frente.
sector.aquarion-blastedDockyard.name = Estaleiro Destruído
sector.aquarion-blastedDockyard.description = Um antigo lar. Atualmente sob cerco, este será verdadeiramente um desafio.
sector.aquarion-coupled-basin.name = Bacia Acoplada
sector.aquarion-coupled-basin.description = Fortificações crux apoiam uma patrulha se movendo por esta área. Garanta a segurança e destrua a patrulha.
sector.aquarion-lakesideLibrary.name = Biblioteca à Beira do Lago
sector.aquarion-lakesideLibrary.description = Abriga principalmente conhecimento relacionado à distribuição, não há inimigos presentes. Não é necessário entrar neste lugar.
sector.aquarion-submerged-canyon.name = Cânion Submerso
sector.aquarion-submerged-canyon.description = Você tropeçou em uma de suas rotas de suprimentos. Utilize a estrutura do cânion para bloquear os comboios.
sector.aquarion-FeldsparRavine.name = Ravina de Feldspato
sector.aquarion-FeldsparRavine.description = Os Gerbs utilizam os cadáveres de seus soldados para transformá-los em máquinas sem alma. Utilize o recipiente de lixiviação de biotita para obter alumínio e matéria férrica.
sector.aquarion-brine-plateau.name = Planalto de Salmoura
sector.aquarion-galenafringe.name = Orla de Galena
sector.aquarion-galenafringe.description = Uma trincheira muito profunda com altas quantidades de atividade geotérmica. Rica em formações de galena.
sector.aquarion-violet-valley.name = Vale Violeta
sector.aquarion-violet-valley.description = Um vale cheio de muitos crescimentos de esporos; Caules Varcaud erguem-se sobre Samambaia Brulr, Sarças e Flores Rel. Samambaias Kol e Ramos Adre crescem em abundância no solo coberto de vegetação. Por razões ainda desconhecidas, Crux enviou um grupo expedicionário para este vale. A destruição desta expedição impediria os planos da Crux.
sector.aquarion-frozen-lake.name = Lago Congelado
sector.aquarion-frozen-lake.description = Uma grande parte deste setor é ocupada por um lago. O inimigo provavelmente terá uma presença naval. Prepare-se de acordo. Também há falta de areia aqui, utilize centrífugas de sucata para obtê-la.
sector.aquarion-verdant-shallows.name = Águas Rasas Verdejantes
sector.aquarion-verdant-shallows.description = Uma região de Tantros onde o oceano é particularmente raso. Não deixe a aparente tranquilidade deste setor enganar você, Gerb estão presentes.
sector.aquarion-stormy-coast.name = Costa Tempestuosa
sector.aquarion-stormy-coast.description = Este setor parece ter tempestades intensas quase constantes. Pouse durante a calmaria e prepare-se. É recomendado começar a configurar alguns escudos assim que a chuva começar. 
sector.aquarion-ruined-repository.name = Repositório em Ruínas
sector.aquarion-ruined-repository.description = Um repositório abrigando conhecimento sobre brocas. Devido à sua idade, algumas partes se degradaram significativamente.
sector.aquarion-icy-river.name = Rio Gelado
sector.aquarion-icy-river.description = Queimadores de chumbo são úteis para iniciar sua fábrica, mas conforme você progride, precisará de mais e melhor geração de energia. Este setor parece conter grandes reservas abertas de enxofre, que são necessárias para o reator de zarcão, seu primeiro passo para uma geração de energia mais eficiente. Ele produz significativamente mais energia do que os queimadores de chumbo, mas também requer mais configuração.


