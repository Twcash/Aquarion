resurgence-nohelp = [accent]Não haverá informações neste reino. Delubrum hospeda o conhecimento que você procura...
feldspar-ravine-obtain-resources = O [accent]Recipiente de Lixiviação de Biotita[] é uma maneira\nde transformar a inútil [accent]Biotita[] em recursos utilizáveis.\nObtenha os recursos necessários para construir um.
feldspar-ravine-build-biotite-leacing-vessel = Você pode construí-lo aqui. A fim de operá-lo\nvocê pode sifonar alguma [accent]Biotita[] dos\n[accent]Difusores de Magma[]. Não se esqueça de adicionar\n[accent]Ácido Muriático[]!
