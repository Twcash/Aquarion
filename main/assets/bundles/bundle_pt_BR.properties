block.aquarion-metaglass-pulverizer.name = Pulverizador de Metavidro
block.aquarion-metaglass-pulverizer.description = Esmaga o Metavidro em chumbo e silício. Produz um pouco de oxigênio como subproduto.
block.aquarion-fume-separator.name = Separador de Vapores
block.aquarion-fume-separator.description = Separa uma variedade de recursos dos vapores.
block.aquarion-cooling-tower.name = Torre de Resfriamento
block.aquarion-cooling-tower.description = Usa energia para resfriar a névoa em água. O calor é transferido para fora em um lado.
block.aquarion-solar-boiler.name = Caldeira Solar
block.aquarion-solar-boiler.description = Usa radiação solar para ferver a água.
block.aquarion-solid-boiler.name = Caldeira de Sólidos
block.aquarion-solid-boiler.description = Usa sólidos inflamáveis para ferver a água.
block.aquarion-solid-boiler.details = Esperava algo diferente?
block.aquarion-scrap-centrifuge.name = Centrífuga de Sucata
block.aquarion-scrap-centrifuge.description = Usa força centrífuga para separar alguns dos materiais básicos da sucata.
block.aquarion-cupronickel-alloying-crucible.name = Crisol de Liga de Cuproníquel
block.aquarion-cupronickel-alloying-crucible.description = Liga cobre e níquel para produzir cuproníquel. Requer ar para funcionar. Pode ser impulsionado com calor.
block.aquarion-metaglass-annealing-furnace.name = Forno de Recozimento de Metavidro
