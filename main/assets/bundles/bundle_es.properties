block.aquarion-siphon-underflow.description = Sends liquids to the sides of the input, will send liquids forward if unable to send liquids to the sides. [#c61e1e]WILL MELT AT HIGH TEMPERATURES.
block.aquarion-siphon.name = Siphon
block.aquarion-pulse-siphon.name = Pulse Siphon
block.aquarion-pulse-siphon.description = Moves liquids forwards.
block.aquarion-siphon.description = Moves liquids forwards. [#c61e1e]WILL MELT AT HIGH TEMPERATURES.
