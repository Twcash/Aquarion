##PLAYER FACTORIES
block.aquarion-brass-mixing-pot.name = Brass Mixing Pot
block.aquarion-brass-mixing-pot.description = Alloys copper and zinc to create Brass. Can be boosted with nitrogen.
block.aquarion-magma-diffuser.name = Magma Diffuser
block.aquarion-magma-diffuser.description = Separates a medley of materials from magma.
block.aquarion-biotite-leaching-vessel.name = Biotite Leaching Vessel
block.aquarion-biotite-leaching-vessel.description = Uses muriatic acid to decompose biotite into more, simpler materials.
block.aquarion-geothermal-evaporator.name = Geothermal Evaporator
block.aquarion-geothermal-evaporator.description = Uses geothermal heat to boil halidic water into muriatic acid and salt.
block.aquarion-nuetralization-vessel.name = Neutralization Vessel
block.aquarion-nuetralization-vessel.description = Uses acid neutralization with the basic hydroxide to produce water and heat.
block.aquarion-bauxite-centrifuge.name = Bauxite Centrifuge
block.aquarion-bauxite-centrifuge.description = Separates elements such as aluminum and ferric material from bauxite via centrifugal force.
block.aquarion-ferrosilicon-foundry.name = Ferrosilicon Foundry
block.aquarion-ferrosilicon-foundry.description = Alloys ferric matter and silicon.  Requires power and water to operate. Can optionally be boosted with heat.
block.aquarion-ferrosilicon-foundry.details = A slow process. Multiple factories may be needed to provide a sustainable supply.
block.aquarion-slag-refinement-array.name = Slag Refinement Platform
block.aquarion-slag-refinement-array.description = Refines slag into several different resources.
block.aquarion-azurite-kiln.name = Azurite Kiln
block.aquarion-azurite-kiln.description = Melts down azurite to obtain copper and hydroxide.
block.aquarion-ammonia-compressor.name = Ammonia Compressor
block.aquarion-ammonia-compressor.description = Chemically turns methane and nitrogen into ammonia.
block.aquarion-towanite-reduction-vat.name = Towanite Reduction Vat
block.aquarion-towanite-reduction-vat.description = Reduces towanite into its base components. Requires fumes to operate.
block.aquarion-fume-mixer.name = Fume Mixer
block.aquarion-fume-mixer.description = Creates synthetic fumes for fume purposes....
block.aquarion-galena-crucible.name = Galena Crucible
block.aquarion-galena-crucible.description = Deconstructs galena crystals into it's core components including copper, lead, and brimstone.
block.aquarion-metaglass-pulverizer.name = Metaglass Pulverizer
block.aquarion-metaglass-pulverizer.description = Crushes Metaglass down into lead and silicon. Produces some oxygen as a byproduct.
block.aquarion-fume-separator.name = Fume Separator
block.aquarion-fume-separator.description = Cracks fumes into some of it's usable components.
block.aquarion-cooling-tower.name = Cooling Tower
block.aquarion-cooling-tower.description = Uses Power to cool down haze into water. The heat gets transferred out on one side.
block.aquarion-solar-boiler.name = Solar Boiler
block.aquarion-solar-boiler.description = Uses solar radiation to boil water.
block.aquarion-solid-boiler.name = Solid Boiler
block.aquarion-solid-boiler.description = Uses flammable solids to boil water. Input and output liquids are shared among all adjacent solid boilers.
block.aquarion-solid-boiler.details = Expect something different?
block.aquarion-scrap-centrifuge.name = Scrap Centrifuge
block.aquarion-scrap-centrifuge.description = Uses centrifugal force to separate some of scrap's basic materials.
block.aquarion-cupronickel-alloying-crucible.name = Cupronickel Alloying Crucible
block.aquarion-cupronickel-alloying-crucible.description = Alloys copper and nickel to produce cupronickel. Requires air to function. Can be boosted with heat and/or nitrogen.
block.aquarion-metaglass-annealing-furnace.name = Metaglass Annealing Furnace
block.aquarion-metaglass-annealing-furnace.description = Anneals lead and sand to make metaglass. Can be boosted with heat and/or minium, but needs air to be cooled.
block.aquarion-thermal-cracking-unit.name = Thermal Cracking Unit
block.aquarion-thermal-cracking-unit.description = Deconstructs crude oil into more simpler components for further refinement.
block.aquarion-polymer-press.name = Polymer Press
block.aquarion-polymer-press.description = Uses extreme heat and pressure to polymerize liquid petroleum.
block.aquarion-silicon-oxidator.name = Silicon Oxidator
block.aquarion-silicon-oxidator.description = Reacts silicon with oxygen. Producing sand.
block.aquarion-arc-furnace.name = Arc Furnace
block.aquarion-arc-furnace.description = Uses extreme voltage to heat sand. Producing silicon and oxygen.
block.aquarion-haze-cracking-unit.name = Haze Cracking Unit
block.aquarion-haze-cracking-unit.description = Uses haze to refine petroleum into polymer. Produces ammonia as a byproduct.
block.aquarion-desulferization-assembly.name = Desulfurization Assembly
block.aquarion-desulferization-assembly.description = Extracts brimstone from liquid petroleum releasing methane by-product. Requires heat to function.
block.aquarion-coal-liquefactor.name = Coal Liquefactor
block.aquarion-coal-liquefactor.description = Creates synthetic oil from coal, oxygen, and heat.
block.aquarion-vacuum-freezer.name = Vacuum Freezer
block.aquarion-vacuum-freezer.description = Refrigerates impure water beyond its dew point, forcing impurities to separate.
block.aquarion-acuminite-degredation-array.name = Acuminite Degradation Array
block.aquarion-acuminite-degredation-array.description = Deconstructs acuminite crystals into it's core components including strontium, aluminum, and fluorine.
block.aquarion-atmospheric-centrifuge.name = Atmospheric Centrifuge
block.aquarion-atmospheric-centrifuge.description = Separates the components of air with centrifugal force. Highly inefficient.
block.aquarion-blast-furnace.name = Blast Furnace
block.aquarion-blast-furnace.description = Produces steel from a large amount of ferric matter, oxygen, and coal. Efficiency can be boosted with argon.
block.aquarion-brine-mixer.name = Brine Mixer
block.aquarion-brine-mixer.description = Produces brine from mixing large quantities of water and salt.
