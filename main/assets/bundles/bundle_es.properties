## MESSAGES
resurgence-nohelp = [accent]There will be no information in this realm. Delubrum hosts the knowledge you may seek...
feldspar-ravine-obtain-resources = The [accent]Biotite Leaching Vessel[] is a way\nto turn the otherwise useless [accent]Biotite[] into usable resources.\nObtain the resources necessary to build one.
feldspar-ravine-build-biotite-leacing-vessel = You can build it here. In order to run it\nyou can siphon off some [accent]Biotite[] from the\n[accent]Magma Diffusers[]. Don't forget to add\n[accent]Muriatic Acid[]!
crystal-caverns-opening-1 = Our predecessors had little\nactivity in this region.
crystal-caverns-opening-2 = This means you will have\nto kickstart your economy\nyourself.
crystal-caverns-opening-3 = This gives us a perfect\nchance to test out\nnew power generation\ntechnology.
crystal-caverns-fume-engine = The Fume Engine uses\nfumes to generate\npower! Build one.
crystal-caverns-battery = Since the power output\nis not entirely stable,\nit is recommended to\nutilize batteries to\nbuffer the power.
ingress-welcome = This is[cyan] Tantros[].
ingress-decon = Begin by deconstructing [#655a5a]Derelict[] structures.\n[accent]Deconstructing structures will return all resources.
ingress-magTap = [accent] Magma taps[] are required to be built on [#d24040]Magma Tiles[].
ingress-magDif = Now build the [accent]Magma Diffuser[].\nThis block requires [#d24040]Magma[] to function.
ingress-goodLuck = Use [accent]Siphons[] to connect structures.\n[accent]Siphons[] will accumulate damage when containing high temperature liquids such as [accent]Magma[].\nUse [accent]Mend Pyres[] to counteract this.
torrent-azurite = [royal]Azurite[] is a [accent]copper[] containing crystal, use [accent]Plasma Extractors[] to exploit it.\n Use the [accent]Azurite Kiln[] to refine this resource.

lakeside-library-failure = We were never meant to succeed. But to set the grounds so you can.
lakeside-library-power-connect = Power consuming blocks (As shown by the air intake) cannot connect to power from being adjacent to power consuming structures or pylons.
lakeside-library-outlet = Outlets
lakeside-library-multiple-outlets = Some blocks (Such as the metaglass annealing furnace) needs more than one outlet to be fully powered.
lakeside-library-more-libraries = Further libraries can be unlocked by progressing through the campaign or finishing research.
lakeside-library-connect-outlet = So you must use outlets to connect to power consuming blocks
lakeside-library-info-button = If you wish to see how much outlets a block needs. Simply press the [accent] info [?][] button and divide power consumption by the outlet throughput.
lakeside-library-mixbelt = In tight spots you can mix item belts. however this will require sorting  if you are to access a specific item.
lakeside-library-no-item-bridge = Unfortunately, there are no Item bridges. Every solid block will have to be routed around.
lakeside-library-item-distribution = Item Distribution
lakeside-library-boost-to-exit = (Boost to exit)
lakeside-library-siphon-bridges = Siphon bridges
lakeside-library-siphon-bridges-explanation = Siphon bridges allow for liquids to be transported over solid blocks. Liquids can be added in the middle of a bridge chain.
lakeside-library-valve = Valve
lakeside-library-valve-explanation = Siphon Valves will prioritize outputs to the sides relative to the input. Although they cannot chain for more than 2 blocks before not outputting.
lakeside-library-liquid-melting = Liquid Distribution: [scarlet]Melting[]
lakeside-library-melting-explanation = Some liquids will melt siphons when transported. This will require some form of healing to counteract the damage. Damage is indicated by a smoke effect.


