resurgence-welcome = Это [#815da2]Серпуло[].
resurgence-defunct-introduction = Это архаичные реликвии нашего коллективного союзника.\nОни еще наработаны. Оснащение этими заброшенными машинами может ускорить расширение.
resurgence-tutorial-lead = Свинец требуется для сконструирования конвейеров. Разрушьте заброшенные структуры или вручную добыть, чтобы получить по крайнемере.
resurgence-tutorial-nickel = Никель не использовался нашим коллективным союзником. Это ист нужно выдвигать вручную ор разрушать каменные оссыпи для получения.
resurgence-tutorial-solar = Получение никеля означает, что мы можем генерировать собственную электроэнергию. Постройте солнечный генератор.
resurgence-tutorial-harvester = На собственной энергии мы сможем сконструировать собственные комбайны для добычи никеля.
resurgence-tutorial-outlets-1 = Отличие от наших предшественников. Мы не сможем соединить по цели.
resurgence-tutorial-outlets-2 = Постройте выводы в сторону конструкций, использующих энергию.
resurgence-tutorial-outlets-3 = Выводы имеют установленную токопроводность.\n Откройте [accent]Базу данных ядра[] для знания максимальна токопроводность этого вывода.
resurgence-tutorial-refund = Для отмены допустимости: любая расрохнутая конструкция вернет все исходные не и стоимости.
resurgence-tutorial-enemy = Отряд Crux открыыр угрозу автоматически отправил разведчиков.\n Архаичные оструктуры не могут всегда стоять против врагов...\nМы ввербуем усилить их нашими собственными оружием.
resurgence-tutorial-burner-1 = Солнечные генераторы колеблются днем. Рекомендуется более стабильный источник энергии.
resurgence-tutorial-burner-2 = Наки свинца потребляют воздух и свинец для производства стабильной энергии и миния как побочный продукт.
resurgence-tutorial-burner-3 = Свинец добывается, конечно. Однако мы должны построить и включить воздуховзаты.
resurgence-tutorial-copper = Медь является еще одним важным ресурсом для более прогрессивной технологии.
resurgence-tutorial-respite = Дальнейшие внения налог вскоре суточъ новыми волнами врагов.\n Мы должны расширить нашу инфраструктуру для укрепления нашей обороны.
resurgence-tutorial-retaliation = С потерей раведчиков, войска Crux решили, что это место под атакой.\n Более сильная ветвь Crux будет отправлять экспоненциально более сильные волны врагов до исчерпания их ресурсов.
resurgence-tutorial-metaglass-1 = Наша защита всегда будет сильнее при приборов ем волнам врагов.\n Исследование лучшей технологии будет в нашу пользу.
resurgence-tutorial-metaglass-2 = Метастекло і следующая строка ресурсов для супериорной инфраструктуры.
resurgence-tutorial-factory-booster = Не все являются обязательным город; некоторые - необязательные.\nОткройте [?] опции, чтобы увидеть больше.
resurgence-tutorial-graphite = На метастекле же центрифуги могут свободные диски для понижения жидкостей и других ликвидных ресурсов.\nВода чрежная для получения графита.

ingress-welcome = Это[cyan] Тантрос[]
ingress-decon = Начните с разрушения [#655a5a]Покинутых[] структур.\n[accent]Деконструкция вернет часть ресурсов.
ingress-magTap = 썐[accent]Магмовые экстракторы[] должны быть построены на [#d24040]плитках магмы.[]
ingress-magDif = Теперь постройте  썑[accent] Разделитель магмы[].\nЭтому блоку нужна [#d24040] []썓[accent] Магма[] [] для работы.
ingress-goodLuck = Используйте 썒[accent] Сифон[] для подключения строений.[#d24040]\n []썒[accent] Сифон[] будет постепенно плавиться, перемещая []썓[accent]Магму[]. []\n[accent]Используйте []쎐[accent] Ремонтирующий костер[] чтобы латать его.[]
torrent-azurite = [royal]Азурит[] это  [accent]медь[] содержащеяся в кристалл, используйте Плазменный экстрактор чтобы добыть его.\n Используйте [accent]Азуритовую печь[] для переработки этого ресурса.

crystal-cavern-intro-1 = Наши предшественники имели мало\nдеятельности в этом регионе.
crystal-cavern-intro-2 = Это означает, что вы вынуждены\nсамостоятельно запустить свою экономику.
crystal-cavern-intro-3 = Это дает нам отличную\nвозможность потестировать\nновую технологию генерации энергии.
crystal-cavern-fume-engine = Мотор [accent]дыма[] использует\nдым для генерации\nэнергии! Постройте один.
crystal-cavern-battery = Поскольку выход энергии\nне вполне стабильный,\nрекомендуется\nиспользовать аккумуляторы для\nбуферирования энергии.
crystal-cavern-towanite = Если вы это ранюше не делали,\nто тогда самое время\nдобыть [accent]Тованит[] и исследовать\n[accent]Станцию восстановления тованита[].

