sector.aquarion-mountainsideComplex.description = Ветвь Crux пытается захватить передовое оружие в укреплённой исследовательской базе. Уничтожьте их и двигайтесь дальше.
sector.aquarion-riparian-hold.name = Удержание на берегу
sector.aquarion-dried-riverbed.name = Высохшее русло
sector.aquarion-frigidShores.name = Холодные берега
sector.aquarion-frigidShores.description = Морская ударная группа Crux блокировала этот водный путь, препятствуя доступу к доковому комплексу. Уничтожьте их и двигайтесь дальше.
sector.aquarion-blastedDockyard.name = Разрушенная верфь
sector.aquarion-blastedDockyard.description = Старый дом. В настоящее время под осадой, это действительно будет испытанием.
sector.aquarion-coupled-basin.name = Соединённый бассейн
sector.aquarion-coupled-basin.description = Укрепления Crux поддерживают патруль, движущийся по этой зоне. Обезопасьте и уничтожьте патруль.
sector.aquarion-lakesideLibrary.name = Библиотека на берегу
sector.aquarion-lakesideLibrary.description = Содержит в основном знания по распределению, враги отсутствуют. Посещение этого места не обязательно.



