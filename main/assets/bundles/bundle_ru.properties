block.aquarion-bramble.name = Колючка
block.aquarion-brulr-fern.name = Папоротник Брулера
block.aquarion-volt.name = Вольт
block.aquarion-volt.description = Быстро разряжает электрические дуги.
block.aquarion-volt.details = Интересно, что даёт этот 1%-ный шанс...
block.aquarion-concuss.name = Конкусс
block.aquarion-concuss.description = Стреляет разрушительными пулями в направлении противника.
block.aquarion-perforate.name = Перфорировать
block.aquarion-perforate.description = Стреляет кусками сырья с высокой скоростью.
block.aquarion-perforate.details = Не позволяйте себе попасть в голову!
block.aquarion-blaze.name = Пламя
block.aquarion-blaze.description = 
