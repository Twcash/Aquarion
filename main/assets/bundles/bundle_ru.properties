unit.aquarion-visitor.name = Посетитель
unit.aquarion-visitor.description = Гость в библиотеках делубрума.

unit.aquarion-cull.name = Выбраковка
block.aquarion-cull-inactive.name = Выбраковка
unit.aquarion-cull.description = Слабый невооруженный базовый юнит, способный к строительству и ремонту.
block.aquarion-cull-inactive.description = Слабый, безоружный базовый юнит, способный к строительству и ремонту.

unit.aquarion-rampart.name = Оплот
block.aquarion-rampart-inactive.name = Оплот
unit.aquarion-rampart.description = Умеренно быстрый наземный юнит. Очень полезен в быстрых атаках.
