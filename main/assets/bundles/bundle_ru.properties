## MESSAGES

delubrum-no-enemy = [accent]Враги отсутствуют.

resurgence-nohelp = [accent]В этом мире вы не найдете информации. Делубрум хранит знания, которые вы ищете...
feldspar-ravine-obtain-resources = [accent]Чан для выщелачивания биотита[] позволяет\nпревратить бесполезный в иных случаях [accent]Биотит[] в полезные ресурсы.\nСоберите ресурсы, необходимые для его постройки.
feldspar-ravine-build-biotite-leacing-vessel = Вы можете построить его здесь. Для его работы\nвы можете откачать немного [accent]Биотита[] из\n[accent]Магматических диффузоров[]. Не забудьте добавить\n[accent]Соляную кислоту[]!
crystal-caverns-opening-1 = Наши предшественники почти не\nпроявляли активности в этом регионе.
crystal-caverns-opening-2 = Это значит, что вам придется\nзапускать экономику\nсамостоятельно.
crystal-caverns-opening-3 = Это дает нам отличный\nшанс протестировать\nновую технологию\nвыработки энергии.
crystal-caverns-fume-engine = Дымовой генератор использует\nиспарения для выработки\nэнергии! Постройте один такой.
crystal-caverns-battery = Так как выходная мощность\nне совсем стабильна,\nрекомендуется использовать\nаккумуляторы для\nбуферизации энергии.
ingress-welcome = Это[cyan] Тантрос[]
ingress-decon = Начните с разрушения [#655a5a]Покинутых[] структур.\n[accent]Деконструкция вернет часть ресурсов.
ingress-magTap = 썐[accent]Магмовые экстракторы[] должны быть построены на [#d24040]плитках магмы.[]
ingress-magDif = Теперь постройте  썑[accent] Разделитель магмы[].\nЭтому блоку нужна [#d24040] []썓[accent] Магма[] [] для работы.
ingress-goodLuck = Используйте 썒[accent] Сифон[] для подключения строений.[#d24040]\n []썒[accent] Сифон[] будет постепенно плавиться, перемещая []썓[accent]Магму[]. []\n[accent]Используйте []쎐[accent] Ремонтирующий костер[] чтобы латать его.[]
torrent-azurite = [royal]Азурит[] это  [accent]медь[] содержащеяся в кристалл, используйте Плазменный экстрактор чтобы добыть его.\n Используйте [accent]Азуритовую печь[] для переработки этого ресурса.

lakeside-library-failure = Нам не суждено было добиться успеха. Но мы должны были подготовить почву, чтобы это удалось тебе.
lakeside-library-power-connect = Энергопотребляющие блоки (как показывает воздухозаборник) не могут подключаться к сети, просто находясь рядом с другими потребителями или пилонами.
lakeside-library-outlet = Розетки
lakeside-library-multiple-outlets = Некоторым блокам (таким как печь для отжига метастекла) требуется более одной розетки для полного обеспечения энергией.
lakeside-library-more-libraries = Другие библиотеки можно открыть, продвигаясь по кампании или завершая исследования.
lakeside-library-connect-outlet = Поэтому для подключения к энергопотребляющим блокам необходимо использовать розетки.
lakeside-library-info-button = Если вы хотите узнать, сколько розеток нужно блоку, просто нажмите кнопку [accent] инфо [?][] и разделите потребление энергии на пропускную способность розетки.
lakeside-library-mixbelt = В условиях нехватки места вы можете смешивать конвейеры с предметами. Однако это потребует сортировки, если вам понадобится доступ к конкретному ресурсу.
lakeside-library-no-item-bridge = К сожалению, здесь нет конвейерных мостов. Любой твердый блок придется обходить стороной.
lakeside-library-item-distribution = Распределение предметов
lakeside-library-boost-to-exit = (Ускорение для выхода)
lakeside-library-siphon-bridges = Сифонные мосты
lakeside-library-siphon-bridges-explanation = Сифонные мосты позволяют транспортировать жидкости поверх твердых блоков. Жидкость можно добавлять прямо в середину цепочки мостов.
lakeside-library-valve = Клапан
lakeside-library-valve-explanation = Сифонные клапаны распределяют жидкость по бокам относительно входа в приоритетном порядке. Однако их цепочка не может быть длиннее 2 блоков, иначе они перестанут подавать жидкость.
lakeside-library-liquid-melting = Распределение жидкостей: [scarlet]Плавление[]
lakeside-library-melting-explanation = Некоторые жидкости при транспортировке могут расплавить сифоны. Это потребует какого-либо источника ремонта, чтобы компенсировать получаемый урон. Повреждения сопровождаются эффектом дыма.

ruined-repository-info-button-reminder = Кнопка [?] может раскрыть множество секретов блока, юнита или эффекта состояния. Если блок недоступен вам в кампании (например, вражеские постройки), вы можете изучить его в режиме песочницы.
ruined-repository-mixed-drill-output = Как вы, возможно,\nуже заметили, ваши\nбуры могут добывать\nболее одного ресурса\nза раз.
ruined-repository-sorted-drill-output = Вы можете разделить эти\nвыходные потоки, как\nпоказано здесь.
ruined-repository-drill-only-one-sorted-output = Также можно забирать\nтолько один вид ресурса.\nБур продолжит работать,\nпока не заполнится\nхранилище для всех\nего ресурсов.
ruined-repository-defunct-drill-drill-one = Буры наших предшественников\nбыли менее совершенными.\nОни могут добывать только\nодин тип ресурса\nза раз.
ruined-repository-defunct-drill-boost = Явным преимуществом\nих буров является [поврежденные данные].
ruined-repository-entry-corrupted = [crimson]ОШИБКА\n \nЗапись повреждена.

