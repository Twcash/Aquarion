## ITEMS
item.aquarion-chalkalloy.name = Меловой сплав
item.aquarion-chalkalloy.description = Металлический сплав, используемый исключительно нашими врагами.

item.aquarion-ferrosilicon.name = Ферросилиций
item.aquarion-ferrosilicon.description = Твердый, пластичный металл, используемый для более прочных строений.
item.aquarion-ferrosilicon.details = Этот материал не такой хрупкий и реактивный, как кремний.
item.aquarion-steel.name = Сталь
item.aquarion-steel.description = Прочный углеродно-железный сплав, используемый для усиления сложных конструкций.
item.aquarion-brimstone.name = Сера
item.aquarion-brimstone.description = Реактивный, порошкообразный, желтоватый елемент используется в образовании и других реакциях.
item.aquarion-brimstone.details = Можете ли вы поверить, что ад использует это как топливо?
item.aquarion-towanite.name = Тованит
item.aquarion-towanite.description = Соединение, содержащее смесь ценных ресурсов.
item.aquarion-towanite.details = БЛЕСТЯШКА!! :D
item.aquarion-arsenic.name = Мышьяк
item.aquarion-arsenic.description = Кристаллический элемент, используемый в различных целях.
item.aquarion-arsenic.details = Если мне нельзя это есть, то почему оно выглядит таким вкусным :( крайне токсичен для органики.
item.aquarion-zinc.name = Цинк
item.aquarion-zinc.description = Хрупкий металлический элемент, похожий на магний, устойчивый к коррозии.
item.aquarion-biotite.name = Биотит
item.aquarion-biotite.description = Семейство слюды, встречающееся в магматических и метаморфных породах. Содержит оксид железа и алюминий.
item.aquarion-biotite.details = Состав кажется состоящим в основном из Аннита, филлосиликатного минерала с гидроксильной группой, которая может быть переиспользована в гидроксид.
item.aquarion-bauxite.name = Боксит
item.aquarion-bauxite.description = Неоднородный материал содержащий алюминий и кремнезём. Используется для базового строительства и переработки.
item.aquarion-bauxite.details = Обычно его не обнаруживают в вулканическом материале, но из-за инцидента, связанного с определенными микроорганизмами, это является нормой.
item.aquarion-ceramic.name = Керамика
item.aquarion-ceramic.description = Хрупкий, похожий на стекло, материал с высокой теплоёмкостью. Используется как базовый стройматериал и боеприпасы для шрапнельного оружия.
item.aquarion-nickel.name = Никель
item.aquarion-nickel.description = Ферромагнитный, ковкий материал использующийся для базового строительства и боеприпасов. Используется для различной переработки.
item-aquarion-nickel.details = Не надо это лизать!
item.aquarion-ferric-matter.name = Железная порода
item.aquarion-ferric-matter.description = Очень прочный металл, склонный к коррозии, много где используется.
item.aquarion-ferric-matter.details = Железо, чего вы ожидали? Просто более лаконичное название
item.aquarion-azurite.name = Азурит
item.aquarion-azurite.description = Кристаллическое соединение, содержащее большое количество меди и незначительное количество гидроксида.
item.aquarion-azurite.details = Голубая каменнистая конфета.
item.aquarion-aluminum.name = Алюминий
item.aquarion-aluminum.description = Прочный металл, используемый для выплавки, изготовления боеприпасов и конструкций.
item.aquarion-aluminum.details = НЕ АЛЮМИНЬ, А АЛЮМИНИЙ.
item.aquarion-magnesium-powder.name = Магниевый порошок
item.aquarion-magnesium-powder.description = Высокореактивный порошок магния. Используется для сплавления.
item.aquarion-magnesium-powder.details = Может быть полезен в корпусах реакторов...
item.aquarion-minium.name = Миний
item.aquarion-minium.description = Оксид свинца (II), крайне токсичен для большинства органической жизни. Полезен в нескольких незначительных химических реакциях.
item.aquarion-minium.details = Красный свинец, Окись свинца, Литаргириум, Массикот, Оксид свинца.
item.aquarion-serpentine.name = Серпентин
item.aquarion-serpentine.description = Неорганический ультрамафический минерал, содержащий железо, алюминий, кремний и магний.
item.aquarion-polymer.name = Полимер
item.aquarion-polymer.description = Пластид основанный на органие, используется в конструкциях и производстве юнитов.
item.aquarion-manganese.name = Марганец
item.aquarion-manganese.description = Хрупкий элемент, используемый в инфраструктуре, боеприпасах и выплавке.
item.aquarion-galena.name = Галенит
item.aquarion-galena.description = Кристал, содержащий медь, свинет и серу.
item.aquarion-sodium.name = Натрий
item.aquarion-sodium.description = Мягкий реактивный элемент, используемый для теплообмена и может использоваться для получения кислотных соединений.
item.aquarion-salt.name = Соль
item.aquarion-salt.description = Минерал, содержащий [#86abc3]натрий[] и [#e1ea59]хлорид[].
item.aquarion-salt.details = Образуется, когда кислота и основное соединение нейтрализуют друг друга. Собственно хлорид натрия NaCl.
item.aquarion-acuminite.name = Акаманит
item.aquarion-acuminite.description = Кристалл, содержащий множество различных полезных элементов, включая алюминий, фтор и стронций.
item.aquarion-strontium.name = Стронций
item.aquarion-strontium.description = Высокореактивный и магнитный элемент, используемый в конструкциях боеприпасов или в целях выплавки.
item.aquarion-cupronickel.name = Медно-никелевый сплав
item.aquarion-cupronickel.description = Пластичный металл с высокой термостойкостью. Используется для разнообразных целей.
## LIQUIDS
liquid.aquarion-brine.name = Соляной раствор
liquid.aquarion-brine.description = Концентрированный соляной раствор, используемый для переработки соли. Требуется для производства [#d377f0]гидроксида[].
liquid.aquarion-brine.details = Я даже не могу сделать из этого соленья! Отвратительно!!
liquid.aquarion-hydroxide.name = Гидроксид
liquid.aquarion-hydroxide.description = Химически активный щелочной раствор используемый для производства энергии и переработки.
liquid.aquarion-hydroxide.details = Очиститель канализации! Очень хорошо нейтрализует кислоту!
liquid.aquarion-chlorine.name = Хлорид
liquid.aquarion-chlorine.description = Газообразный элемент, используется для производства [#c2dbd2]Полимера[].
liquid.aquarion-oxygen.name = Кислород
liquid.aquarion-oxygen.description = Используется для химических реакций. Побочный продукт выращивания грядок (фотосинтеза).
liquid.aquarion-dioxide.name = Диоксид
liquid.aquarion-dioxide.description = Пассивное (Нереакционноспособное) соединение, содержащее кислород.
liquid.aquarion-magma.name = Магма
liquid.aquarion-magma.description = Расплавленная порода из сердца кровоточащей планеты.
liquid.aquarion-magma.details = СОВЕТ: Если вы слышите взрыв конвейеров, то, скорее всего, виноват он или дым.
liquid.aquarion-fumes.name = Дым 
liquid.aquarion-fumes.description = Соединение, содержащее неизвестное количество высокореактивных элементов.
liquid.aquarion-fumes.details = Я вообще понятия не имею что это такое если быть честным...
liquid.aquarion-air.name = Воздух
liquid.aquarion-air.description = Смесь газов.
liquid.aquarion-haze.name = Пар
liquid.aquarion-haze.description = Перегретый газ. Используется для выработки электроэнергии, защиты или других процессов связанных с метанном.
liquid.aquarion-halide-water.name = Галидическая вода
liquid.aquarion-halide-water.description = Вода с повышенным содержанием примесей. Многие примеси содержат газы галогенидной группы.
liquid.aquarion-petroleum.name = Керосин
liquid.aquarion-petroleum.description = Переработанная нефть. Полезезна для синтеза пластмасс, сжигания.
liquid.aquarion-methane.name = Метан
liquid.aquarion-methane.description = Горючий углеводородный газ.
liquid.aquarion-ammonia.name = Аммиак
liquid.aquarion-ammonia.description = Едкий газ с исключительной теплопроводностью.
liquid.aquarion-fluorine.name = Фтор
liquid.aquarion-fluorine.description = Высокореактивный газ. Может использоваться для синтеза пластмасс, защиты и восстановления построек.
liquid.aquarion-fluorine.details = пряный газ.
liquid.aquarion-muriatic-acid.name = Соляная кислота
liquid.aquarion-muriatic-acid.description = Кислота, используемая в самых разных целях.
liquid.aquarion-bio-pulp.name = Биологическая жидкость
liquid.aquarion-bio-pulp.description = Жидкость, состоящая из органического материала. Может оказаться полезным в вычислительных структурах или очистке топлива.
liquid.aquarion-argon.name = Аргон
liquid.aquarion-argon.description = Инертный газ содержащийся в воздухе в огромных количиствах.
liquid.aquarion-rare-earth-sludge.name = Осадок редких земель
liquid.aquarion-rare-earth-sludge.description = Минеральный осадок, содержащий гидратированные редкоземельные элементы, такие как иттрий и неодим.
