liquid.aquarion-oxygen.name = Кислород
liquid.aquarion-oxygen.description = Используется для химических реакций. Побочный продукт выращивания грядок (фотосинтеза).
liquid.aquarion-magma.name = Магма
liquid.aquarion-magma.description = Расплавленная порода из сердца кровоточащей планеты.
liquid.aquarion-magma.details = СОВЕТ: Если вы слышите взрыв конвейеров, то, скорее всего, виноват он или дым.
liquid.aquarion-fumes.name = Дым 
