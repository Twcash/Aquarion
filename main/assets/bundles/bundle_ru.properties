block.aquarion-mayhem.name = Майхем
block.aquarion-illustrate.name = Иллюстрировать
block.aquarion-finite.name = Финит
block.aquarion-initialization-bay.name = Залив инициализации
block.aquarion-initialization-bay.description = Активирует неактивные юниты, размещенные внутри. Требует большого количества энергии для функционирования
block.aquarion-manipulation-bay.name = Залив манипуляции
block.aquarion-manipulation-bay.description = Изменяет неактивные юниты и применяет постоянные улучшения статуса.
block.aquarion-minium-reactor.name = Минимальный реактор
block.aquarion-minium-reactor.description = Использует тепло от тумана для разложения \uE982 [#e4543c]миниума[], позволяя кислороду связываться с серой и водой. Производит \uF837 [#8c7fa9]свинец[] и кислоту в процессе.





