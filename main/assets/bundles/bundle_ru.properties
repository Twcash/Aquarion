sector.aquarion-floodPlains.description = Этот сектор приближается к сильно защищённой точке интереса.
sector.aquarion-Lagoon.name = Лагуна
sector.aquarion-Lagoon.description = Эта точка интереса сильно защищена. Необходимы подходящие технологии и стратегия.
