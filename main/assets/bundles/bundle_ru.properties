##PLAYER FACTORIES
block.aquarion-brass-mixing-pot.name = Горшок для смешивания латуни
block.aquarion-brass-mixing-pot.description = Сплавляет медь и цинк для создания латуни. Может быть ускорен азотом.
block.aquarion-magma-diffuser.name = Разделитель магмы
block.aquarion-magma-diffuser.description = Отделяет смесь материалов от магмы.
block.aquarion-biotite-leaching-vessel.name = Сосуд выщелачивания биотита
block.aquarion-biotite-leaching-vessel.description = Использует соляную кислоту для разложения биотита на более простые материалы.
block.aquarion-geothermal-evaporator.name = Геотермальный испаритель
block.aquarion-geothermal-evaporator.description = Использует геотермальное тепло для кипячения галидной воды в соляную кислоту и соль.
block.aquarion-nuetralization-vessel.name = Сосуд нейтрализации
block.aquarion-nuetralization-vessel.description = Использует нейтрализацию кислоты с основным гидроксидом для производства галидной воды и тепла.
block.aquarion-bauxite-centrifuge.name = Бокситовая центрифуга
block.aquarion-bauxite-centrifuge.description = Отделяет такие элементы, как алюминий и железо, от боксита с помощью центробежной силы.
block.aquarion-ferrosilicon-foundry.name = Литейный завод ферросилиция
block.aquarion-ferrosilicon-foundry.description = Сплавляет железо и кремний. Для работы требуется гидроксид и магма.
block.aquarion-ferrosilicon-foundry.details = Затянутый процесс. Для обеспечения поставок в нужном количестве может потребоваться несколько заводов.
block.aquarion-slag-refinement-array.name = Платформа очистки шлака
block.aquarion-slag-refinement-array.description = Очищает шлак в несколько различных ресурсов.
block.aquarion-azurite-kiln.name = Азуритовая печь
block.aquarion-azurite-kiln.description = Плавит азурит с получением меди и гидроксида.
block.aquarion-ammonia-compressor.name = Аммиачный компрессор
block.aquarion-ammonia-compressor.description = Химически преобразует метан и азот в аммиак.
block.aquarion-towanite-reduction-vat.name = Восстанивительный бассейн тованита
block.aquarion-towanite-reduction-vat.description = Восстанавливает тованит до его основных компонентов. Для работы требуется дым.
block.aquarion-fume-mixer.name = Смеситель дыма
block.aquarion-fume-mixer.description = Смешивает компоненты дыма, неэффективно.
block.aquarion-galena-crucible.name = Галеновый тигель
block.aquarion-galena-crucible.description = Разбирает кристаллы галенита на основные компоненты, включая медь, свинец и серу.
block.aquarion-metaglass-pulverizer.name = Размельчитель метастекла
block.aquarion-metaglass-pulverizer.description = Размельчает метастекло на свинец и кремний. Производит немного кислорода в качестве побочного продукта.
block.aquarion-fume-separator.name = Сепаратор дыма
block.aquarion-fume-separator.description = Разделяет разнообразные ресурсы из дыма.
block.aquarion-cooling-tower.name = Охладительная башня
block.aquarion-cooling-tower.description = Использует энергию для охлаждения дыма до воды. Тепло передается на одну сторону.
block.aquarion-solar-boiler.name = Солнечный бойлер
block.aquarion-solar-boiler.description = Кипятит воду с помощью солнечной энергии. Требует воды для работы.
block.aquarion-solid-boiler.name = Твердотопливный бойлер
block.aquarion-solid-boiler.description = Кипятит воду, путем сжигания твердого топлива.
block.aquarion-solid-boiler.details = Ожидали чего-то другого?)
block.aquarion-scrap-centrifuge.name = Центрифуга для лома
block.aquarion-scrap-centrifuge.description = Использует центробежную силу для разделения некоторых основных материалов лома.
block.aquarion-cupronickel-alloying-crucible.name = Тигель сплавления медно-никеля
block.aquarion-cupronickel-alloying-crucible.description = Сплавляет медь и никель для производства медно-никелевого сплава. Требует воздуха для работы. Можно усилить теплом.
block.aquarion-metaglass-annealing-furnace.name = Печь для отжига метастекла
block.aquarion-metaglass-annealing-furnace.description = Отжигает песок, до состояния стекла, и свинец для получения метастекла. Для работы необходимо тепло.
block.aquarion-thermal-cracking-unit.name = Установка термической дестиляции
block.aquarion-thermal-cracking-unit.description = Разлагает сырую нефть на более простые компоненты для дальнейшей очистки. Требует электроэнергии и тепло.
block.aquarion-polymer-press.name = Полимерный пресс
block.aquarion-polymer-press.description = Использует экстремальное тепло и давление для полимеризации жидкой нефти.
block.aquarion-silicon-oxidator.name = Окислитель кремния
block.aquarion-silicon-oxidator.description = Реагирует кремний с кислородом. Производит песок.
block.aquarion-arc-furnace.name = Электродуговая печь
block.aquarion-arc-furnace.description = Использует экстремальное напряжение для нагрева песка. Производит кремний и кислород.
block.aquarion-haze-cracking-unit.name = Установка дестиляции тумана
block.aquarion-haze-cracking-unit.description = Разлагает туман на его основные компоненты, такие как вода, кислород и углерод. Требует тепла для работы.
block.aquarion-desulferization-assembly.name = Узел десульфуризации
block.aquarion-desulferization-assembly.description = Извлекает серу из жидкой нефти, выделяя метан как побочный продукт. Требует тепла для работы.
block.aquarion-coal-liquefactor.name = Угольный сжижитель
block.aquarion-coal-liquefactor.description = Создает синтетическое масло из угля, кислорода и тепла.
block.aquarion-vacuum-freezer.name = Вакуумная морозилка
block.aquarion-vacuum-freezer.description = Охлаждает загрязненную воду выше точки росы, заставляя примеси отделяться.
block.aquarion-acuminite-degredation-array.name = Массив разложения акуминита
block.aquarion-acuminite-degredation-array.description = Разлагает кристаллы акуминита на основные компоненты, включая стронций, алюминий и фтор.
block.aquarion-atmospheric-centrifuge.name = Атмосферная центрифуга
block.aquarion-atmospheric-centrifuge.description = Разделяет компоненты воздуха центробежной силой.
block.aquarion-blast-furnace.name = Доменная печь
block.aquarion-blast-furnace.description = Производит сталь из большого количества железной руды, кислорода и угля. Эффективность можно повысить с помощью тепла и охладителя.
block.aquarion-brine-mixer.name = Смеситель соляного раствора
block.aquarion-brine-mixer.description = Производит соляной раствор путем смешивания больших количеств воды и соли.
block.aquarion-electrolysis-vat.name = Водный электролизер
block.aquarion-electrolysis-vat.description = Использует электролиз для разделения воды на газообразный водород и кислород.
block.aquarion-electrolysis-vat.details = *Кислород распределяется только в направлении выхода кислорода, то же самое касается водорода. Вода распределяется во всех направлениях.
block.aquarion-brine-electrolysis-manifold.name = Коллектор электролиза соляного раствора
block.aquarion-brine-electrolysis-manifold.description = Электролизирует соляной раствор на более чистые компоненты. Такие как хлор, водород и гидроксид.
block.aquarion-spore-processor.name = Обработчик спор
block.aquarion-spore-processor.description = Смешивает споры в суспензию.
block.aquarion-gasifier.name = Газификатор
block.aquarion-gasifier.description = Нагревает биологическую суспензию с образованием рафинированного кокса и остаточного пара.
block.aquarion-ultramafic-refinery.name = Ультрамафическая очистка
block.aquarion-ultramafic-refinery.description = Измельчает серпентин на его основные материалы.
block.aquarion-convection-heater.name = Конвекционный нагреватель
block.aquarion-convection-heater.description = Использует тепловую конвекцию воды для производства большого количества тепла.
block.aquarion-solid-heater.name = Твердотопливный нагреватель сгорания
block.aquarion-solid-heater.description = Сжигает горючие твердые вещества с кислородом для производства тепла
block.aquarion-combustion-heater.name = Жидкостный нагреватель сгорания
block.aquarion-combustion-heater.description = Использует тепловые отходы сгорания жидкости для производства небольшого количества тепла.
block.aquarion-heat-channel.name = Теплоканал
block.aquarion-heat-channel.description = Передает тепло блокам впереди себя.

