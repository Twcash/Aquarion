item.aquarion-zinc.description = Хрупкий металлический элемент, похожий на магний, устойчивый к коррозии.
item.aquarion-biotite.name = Биотит
item.aquarion-biotite.description = Семейство слюды, встречающееся в магматических и метаморфных породах. Содержит оксид железа и алюминий.
item.aquarion-biotite.details = Состав кажется состоящим в основном из Аннита, филлосиликатного минерала с гидроксильной группой, которая может быть переиспользована в гидроксид.
item.aquarion-bauxite.name = Боксит
item.aquarion-bauxite.description = Неоднородный материал содержащий алюминий и кремнезём. Используется для базового строительства и переработки.
item.aquarion-bauxite.details = Обычно его не обнаруживают в вулканическом материале, но из-за инцидента, связанного с определенными микроорганизмами, это является нормой.
item.aquarion-ceramic.name = Керамика
item.aquarion-ceramic.description = Хрупкий, похожий на стекло, материал с высокой теплоёмкостью. Используется как базовый стройматериал и боеприпасы для шрапнельного оружия.
item.aquarion-nickel.name = Никель
item.aquarion-nickel.description = Ферромагнитный, ковкий материал использующийся для базового строительства и боеприпасов. Используется для различной переработки.
item-aquarion-nickel.details = Не надо это лизать!
item.aquarion-ferric-matter.name = Железная порода
item.aquarion-ferric-matter.description = Очень прочный металл, склонный к коррозии, много где используется.
item.aquarion-ferric-matter.details = Железо, чего вы ожидали? Просто более лаконичное название
item.aquarion-azurite.name = Азурит
item.aquarion-azurite.description = Кристаллическое соединение, содержащее большое количество меди и незначительное количество гидроксида.
item.aquarion-azurite.details = Голубая каменнистая конфета.
item.aquarion-aluminum.name = Алюминий
item.aquarion-aluminum.description = Прочный металл, используемый для выплавки, изготовления боеприпасов и конструкций.
item.aquarion-aluminum.details = НЕ АЛЮМИНЬ, А АЛЮМИНИЙ.
item.aquarion-magnesium-powder.name = Магниевый порошок
item.aquarion-magnesium-powder.description = Высокореактивный порошок магния. Используется для сплавления.
item.aquarion-magnesium-powder.details = Может быть полезен в корпусах реакторов...
item.aquarion-minium.name = Миний
item.aquarion-minium.description = Оксид свинца (II), крайне токсичен для большинства органической жизни. Полезен в нескольких незначительных химических реакциях.
item.aquarion-minium.details = Красный свинец, Окись свинца, Литаргириум, Массикот, Оксид свинца.
item.aquarion-serpentine.name = Серпентин
item.aquarion-serpentine.description = Неорганический ультрамафический минерал, содержащий железо, алюминий, кремний и магний.
item.aquarion-polymer.name = Полимер
item.aquarion-polymer.description = Пластид основанный на органие, используется в конструкциях и производстве юнитов.
item.aquarion-manganese.name = Марганец
item.aquarion-manganese.description = Хрупкий элемент, используемый в инфраструктуре, боеприпасах и выплавке.
item.aquarion-galena.name = Галенит
item.aquarion-galena.description = Кристал, содержащий медь, свинет и серу.
item.aquarion-sodium.name = Натрий
item.aquarion-sodium.description = Мягкий реактивный элемент, используемый для теплообмена и может использоваться для получения кислотных соединений.
item.aquarion-salt.name = Соль
item.aquarion-salt.description = Минерал, содержащий [#86abc3]натрий[] и [#e1ea59]хлорид[].
item.aquarion-salt.details = Образуется, когда кислота и основное соединение нейтрализуют друг друга. Собственно хлорид натрия NaCl.
item.aquarion-acuminite.name = Акаманит
item.aquarion-acuminite.description = Кристалл, содержащий множество различных полезных элементов, включая алюминий, фтор и стронций.
item.aquarion-strontium.name = Стронций
item.aquarion-strontium.description = Высокореактивный и магнитный элемент, используемый в конструкциях боеприпасов или в целях выплавки.
item.aquarion-cupronickel.name = Медно-никелевый сплав
item.aquarion-cupronickel.description = Пластичный металл с высокой термостойкостью. Используется для разнообразных целей.
item.aquarion-uranium.name = Уран
item.aquarion-uranium.description =
item.aquarion-radium.name = Радий
item.aquarion-radium.description = ´
item.aquarion-pitchblende.name = Настуран
item.aquarion-cuprite.name = Куприт
item.aquarion-cuprite.description = Оксид меди(I), блестящий красный кристалл, также известный как «рубиновая медь».
item.aquarion-thorium.name = Торий
item.aquarion-thorium.description = Радиоактивный элемент, используемый в некоторых реакциях и конструкциях. Требует осторожного обращения.
item.aquarion-spore-pod.name = Споровый стручок
item.aquarion-spore-pod.description = Органическое соединение, содержащее споры, которые могут быть полезны в различных реакциях и конструкциях. Требует осторожного обращения.
item.aquarion-pentlandite.name = Пентландит
item.aquarion-pentlandite.description =

item.aquarion-crystal.name = Кристалл
item.aquarion-pearl.name = Перл

## LIQUIDS
liquid.aquarion-brine.name = Соляной раствор
liquid.aquarion-brine.description = Концентрированный соляной раствор, используемый для переработки соли. Требуется для производства [#d377f0]гидроксида[].
liquid.aquarion-brine.details = Я даже не могу сделать из этого соленья! Отвратительно!!
liquid.aquarion-hydroxide.name = Гидроксид
liquid.aquarion-hydroxide.description = Химически активный щелочной раствор используемый для производства энергии и переработки.
liquid.aquarion-hydroxide.details = Очиститель канализации! Очень хорошо нейтрализует кислоту!
liquid.aquarion-chlorine.name = Хлорид
liquid.aquarion-chlorine.description = Газообразный элемент, используется для производства [#c2dbd2]Полимера[].
liquid.aquarion-oxygen.name = Кислород
liquid.aquarion-oxygen.description = Используется для химических реакций. Побочный продукт выращивания грядок (фотосинтеза).
liquid.aquarion-magma.name = Магма
liquid.aquarion-magma.description = Расплавленная порода из сердца кровоточащей планеты.
liquid.aquarion-magma.details = СОВЕТ: Если вы слышите взрыв конвейеров, то, скорее всего, виноват он или дым.
liquid.aquarion-fumes.name = Дым
liquid.aquarion-fumes.description = Соединение, содержащее неизвестное количество высокореактивных элементов.
liquid.aquarion-fumes.details = Я вообще понятия не имею что это такое если быть честным...
liquid.aquarion-air.name = Воздух
liquid.aquarion-air.description = Смесь газов.
liquid.aquarion-haze.name = Пар
liquid.aquarion-haze.description = Перегретый газ. Используется для выработки электроэнергии, защиты или других процессов связанных с метанном.
liquid.aquarion-halide-water.name = Галидическая вода
liquid.aquarion-halide-water.description = Вода с повышенным содержанием примесей. Многие примеси содержат газы галогенидной группы.
liquid.aquarion-petroleum.name = Керосин
liquid.aquarion-petroleum.description = Переработанная нефть. Полезезна для синтеза пластмасс, сжигания.
liquid.aquarion-methane.name = Метан
liquid.aquarion-methane.description = Горючий углеводородный газ.
liquid.aquarion-cryogen.name = Криоген
liquid.aquarion-cryogen.description = Холодный сжатый воздух. Используется для охлаждения или криогенной дистилляции.
liquid.aquarion-cryogen.details = Не тот, что из Террарии...
liquid.aquarion-ammonia.name = Аммиак
liquid.aquarion-ammonia.description = Едкий газ с исключительной теплопроводностью.
liquid.aquarion-fluorine.name = Фтор
liquid.aquarion-fluorine.description = Высокореактивный газ. Может использоваться для синтеза пластмасс, защиты и восстановления построек.
liquid.aquarion-fluorine.details = пряный газ.
liquid.aquarion-muriatic-acid.name = Соляная кислота
liquid.aquarion-muriatic-acid.description = Кислота, используемая в самых разных целях.
liquid.aquarion-vitriol.name = Купоросное масло
liquid.aquarion-vitriol.description = Дымящая кислота, используемая для самых разных целей.
liquid.aquarion-bio-pulp.name = Биологическая жидкость
liquid.aquarion-bio-pulp.description = Жидкость, состоящая из органического материала. Может оказаться полезным в вычислительных структурах или очистке топлива.
liquid.aquarion-argon.name = Аргон
liquid.aquarion-argon.description = Инертный газ содержащийся в воздухе в огромных количиствах.
liquid.aquarion-rare-earth-sludge.name = Осадок редких земель
liquid.aquarion-rare-earth-sludge.description = Минеральный осадок, содержащий гидратированные редкоземельные элементы, такие как иттрий и неодим.

## SECTORS
sector.aquarion-Ingress.name = Точка входа
sector.aquarion-Ingress.description = Ваша первая вылазка на новую планету. Используйте магматический насос и магматический рассеиватель, чтобы запустить свою экономику.
sector.aquarion-Ecotone.name = Экотон
sector.aquarion-Ecotone.description = Благодаря наличию рассола в этом секторе, для выработки энергии можно использовать электролиз рассола.
sector.aquarion-diseased-cleft.name = Чумная расселина
sector.aquarion-diseased-cleft.description = Крукс возвели бастион в зараженном ущелье. Уничтожьте его.
sector.aquarion-EnsuingTorrent.name = Последующий поток
sector.aquarion-EnsuingTorrent.description = Эти странные формы жизни кажутся чем-то большим, чем просто локальный феномен. Местные залежи азурита окажутся полезным источником меди.
sector.aquarion-CrystalCavern.name = Кристальная пещера
sector.aquarion-CrystalCavern.description = Поскольку в этой местности нет термальных источников, необходимо задействовать новые способы получения энергии и ресурсов. Для этой цели пригодятся паровой двигатель, буровая вышка и переработка тованита.
sector.aquarion-Grove.name = Роща
sector.aquarion-Grove.description = Скоро потребность в энергии превысит доступное термальное тепло, но пока что его должно хватить. Этот сектор зарос сильнее, чем все предыдущие. Циркулярная пила полезна для автоматического удаления препятствий, но она не может перемещаться. Юниты, однако, могут. Pugnate или другие юниты на ваш выбор могут уничтожать эти препятствия, если вы прикажете им это сделать.
sector.aquarion-resurgence.name = Возрождение
sector.aquarion-resurgence.description = Идеальная зона для прорыва через орбитальную оборону, наше завоевание начинается здесь.
sector.aquarion-twinPass.name = Двойной путь
sector.aquarion-twinPass.description = Заброшенные руины рассыпаны по этим пустошам. Уничтожьте патруль Crux и двигайтесь дальше.
sector.aquarion-erodedCanyon.name = Эродированный каньон
sector.aquarion-erodedCanyon.description = Команда Crux охраняет этот водный путь. Этот путь нужен для доступа к Северным воротам.
sector.aquarion-fungal-tropics.name = Грибные тропики
sector.aquarion-fungal-tropics.description = Патруль Crux следит за этой зоной, обезопасьте её и двигайтесь дальше.
sector.aquarion-seared-wastes.name = Выжженные пустоши
sector.aquarion-seared-wastes.description = Здесь перемещается патруль Crux. Уничтожение этого патруля необходимо для продвижения.
sector.aquarion-floodPlains.name = Паводковые равнины
sector.aquarion-floodPlains.description = Этот сектор приближается к сильно защищённой точке интереса.
sector.aquarion-Lagoon.name = Лагуна
sector.aquarion-Lagoon.description = Эта точка интереса сильно защищена. Необходимы подходящие технологии и стратегия.
sector.aquarion-lowlandStrait.name = Лоулендский пролив
sector.aquarion-lowlandStrait.description = Бродячий морской патруль Crux оказался здесь в затруднении. Уничтожьте их и двигайтесь дальше.
sector.aquarion-mountainsideComplex.name = Горный комплекс
sector.aquarion-mountainsideComplex.description = Ветвь Crux пытается захватить передовое оружие в укреплённой исследовательской базе. Уничтожьте их и двигайтесь дальше.
sector.aquarion-riparian-holt.name = Прибрежная лощина
sector.aquarion-riparian-holt.description = Здесь находится узкий заросший овраг. Примечательно наличие здесь небольших почвенных образований. Гербы загнали нас в «бутылочное горлышко», мы будем атакованы с двух сторон.
sector.aquarion-dried-riverbed.name = Высохшее русло
sector.aquarion-dried-riverbed.description = Узкое место в логистической сети Crux. Уничтожьте их конвой, чтобы сломить их контроль над этим регионом. Предварительная разведка подтвердила присутствие юнитов 5-го тира. Готовьтесь соответствующим образом.
sector.aquarion-frigidShores.name = Холодные берега
sector.aquarion-frigidShores.description = Морская ударная группа Crux блокировала этот водный путь, препятствуя доступу к доковому комплексу. Уничтожьте их и двигайтесь дальше.
sector.aquarion-blastedDockyard.name = Разрушенная верфь
sector.aquarion-blastedDockyard.description = Старый дом. В настоящее время под осадой, это действительно будет испытанием.
sector.aquarion-coupled-basin.name = Соединённый бассейн
sector.aquarion-coupled-basin.description = Укрепления Crux поддерживают патруль, движущийся по этой зоне. Обезопасьте и уничтожьте патруль.
sector.aquarion-lakesideLibrary.name = Библиотека на берегу
sector.aquarion-lakesideLibrary.description = Содержит в основном знания по распределению, враги отсутствуют. Посещение этого места не обязательно.
sector.aquarion-submerged-canyon.name = Затопленный каньон
sector.aquarion-submerged-canyon.description = Вы наткнулись на один из их путей снабжения. Используйте структуру каньона, чтобы заблокировать конвои.
sector.aquarion-FeldsparRavine.name = Полевошпатовое ущелье
sector.aquarion-FeldsparRavine.description = Гербы используют мёртвые тела своих солдат, превращая их в бездушные машины. Используйте биотитовый чан выщелачивания, чтобы получать алюминий и соединения железа.
sector.aquarion-brine-plateau.name = Рассольное плато
sector.aquarion-galenafringe.name = Галенитовая окраина
sector.aquarion-galenafringe.description = Очень глубокий жёлоб с высокой геотермальной активностью. Богат залежами галенита.
sector.aquarion-violet-valley.name = Фиолетовая долина
sector.aquarion-violet-valley.description = Долина, покрытая обильными споровыми наростами; стебли варкода возвышаются над брулрским папоротником, ежевикой и реликтовыми цветами. На заросшей почве в изобилии произрастают папоротники коль и побеги адре. По пока неизвестным причинам Crux отправили в эту долину экспедиционную группу. Уничтожение этой экспедиции сорвёт планы Crux.
sector.aquarion-frozen-lake.name = Замёрзшее озеро
sector.aquarion-frozen-lake.description = Большая часть этого сектора занята озером. Враг, скорее всего, задействует флот. Готовьтесь соответствующим образом. Здесь также наблюдается нехватка песка, используйте центрифуги лома для его получения.
sector.aquarion-verdant-shallows.name = Зеленеющее мелководье
sector.aquarion-verdant-shallows.description = Регион Тантроса, где океан особенно мелок. Не позволяйте кажущемуся спокойствию этого сектора обмануть вас: здесь присутствуют Гербы.
sector.aquarion-stormy-coast.name = Штормовой берег
sector.aquarion-stormy-coast.description = Похоже, в этом секторе почти постоянно бушуют свирепые штормы. Высаживайтесь во время затишья и готовьтесь. Рекомендуется начать установку щитов, как только пойдет дождь.
sector.aquarion-ruined-repository.name = Разрушенное хранилище
sector.aquarion-ruined-repository.description = Хранилище, содержащее знания о бурах. Из-за своего возраста некоторые части значительно деградировали.
sector.aquarion-icy-river.name = Ледяная река
sector.aquarion-icy-river.description = Свинцовые горелки помогут запустить ваш завод, но по мере развития вам потребуется больше качественных источников энергии. Этот сектор, по-видимому, содержит большие открытые запасы серы, которые необходимы для миниумного реактора — вашего первого шага к более эффективной генерации энергии. Он производит значительно больше энергии, чем свинцовые горелки, но также требует более сложной настройки.


