##HINTS

hint.aquarion-ammo = Хотя некоторые турели требуют более высокого уровня материалов, однако рекомендуется нацелить внимание на них потребление боеприпасов.\nТурели так как [accent]Пелт[] Потребляют огромное количество боеприпасов за одн ыстрел.
hint.aquarion-outposts = Некоторые секторы содержат вражеские аутпосты. Большинство из них производят юниты через установленное время.\nВ при победе сектора эти районы самоуничтожаются.
hint.aquarion-boosting = Огромное количество оструктур, связанных с производством и иснользованием, могут принять усилители.\nПосмотрите [accent]?[] меню для понимания, какие усилители может выстраивать блок.
hint.aquarion-solar = Солнечные генераторы поставляют огромное количество энергии, но весьма ненадежны./n Очень рекомендуется переставить на более стабильный источник строга.
hint.aquarion-power = Большинство конструкций не могут прямо подключаться к энергометоду. Выводы должны быть использованы для перередачи Истечения.\nВыводы также могут быть включены/выключены при нажатии или щелчке на них.
hint.aquarion-siphon = Некоторые блоки распределения жидкости будут испытывать ун во времени, когда температуры жидкости являются экстравагантным\n[accent]Этот ун может быть легко вылечен любым базовым блоком устранения.[]


