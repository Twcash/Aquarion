
## BLOCKS
block.aquarion-petroleum-engine.name = Бензиновый двигатель
block.aquarion-petroleum-engine.description = Потребляет большое количество жидкого топлива и кислорода для преобразования химической энергии сгорания в электроэнергию.
block.aquarion-sealed-conveyor.name = Герметичный конвейер
block.aquarion-sealed-conveyor.description = Водостойкий конвейер, который перемещает предметы вперед с умеренной скоростью.
block.aquarion-armored-sealed-conveyor.name = Бронированный герметичный конвейер
block.aquarion-armored-sealed-conveyor.description = Водостойкий конвейер, который перемещает предметы вперед с умеренной скоростью. Не принимает не конвеерный вход по бокам.
block.aquarion-manganese-rail.name = Марганцевый рельс
block.aquarion-manganese-rail.description = Перевозит предметы пачками вперед. Принимает предметы сзади и выгружает их в трех направлениях спереди. Для обеспечения максимальной производительности требуется несколько точек погрузки и разгрузки.
block.aquarion-sealed-router.name = Герметичный маршрутизатор
block.aquarion-sealed-router.description = Необходимое зло. Может распределять предметы из нескольких входов и выходов во всех направлениях, не рекомендуется ставить возле производственных зданий.
block.aquarion-sealed-junction.name = Герметичный перекрёсток
block.aquarion-sealed-junction.description = Действует как мост для двух пересекающихся конвейерных лент
block.aquarion-cache.name = Склад
block.aquarion-cache.description = Хранит большое изобилие предметов.
block.aquarion-cache.details = Удобен для сортировки предметов из заводов с несколькими предметами на выход.
block.aquarion-sealed-unloader.name = Герметичный
block.aquarion-sealed-unloader.description = Разгружает предметы из построек позади.
block.aquarion-sealed-sorter.name = Герметичный сортировщик
block.aquarion-sealed-sorter.description = Водостойкий сортировщик, который выводит фильтруемые предметы вперед, а все остальные предметы по бокам.
block.aquarion-sealed-inverted-sorter.name = Герметичный инвертированный сортировщик
block.aquarion-sealed-inverted-sorter.description = Водостойкий сортировщик, который выводит отфильтрованные предметы вперед, а все остальные предметы по бокам.
block.aquarion-sealed-distributor.name = Герметичный распределитель
block.aquarion-sealed-distributor.description = Водонепроницаемый сортировщик, который выводит отфильтрованные предметы вперед, а все остальные по бокам.
block.aquarion-mass-distributor.name = Массовый распределитель
block.aquarion-mass-distributor.description = Огромный водостойкий маршрутизатор, который равномерно распределяет входящие предметы по 15 направлениям выхода.
block.aquarion-sealed-overflow.name = Герметичный избыточный затвор
block.aquarion-sealed-overflow.description = Водостойкий избыточный затвор, выводит предметы по бокам только если противоположная от входа сторона не может принимать предметы.
block.aquarion-sealed-underflow.name = Герметичный избыточный шлюз
block.aquarion-sealed-underflow.description = Водостойкий избыточный шлюз, выводит предметы прямо только если боковые стороны не могут принимать предметы.
block.aquarion-relay.name = Передатчик
block.aquarion-relay.description = Соединяет электрические сети. Поглощает небольшое количество энергии из-за плотности воды.
block.aquarion-build-cairn.name = Строительная вышка
block.aquarion-build-cairn.description = Помогает в строительстве и деконструкции построек, может также использоваться в производстве юнитов.
block.aquarion-force-generator.name = Генератор силового поля
block.aquarion-force-generator.description = Генерирует слабый щит для защиты конструкций. В основном используется для защиты нестабильных структур от опасной погоды.
block.aquarion-polymer-wall.name = Полимерная стена
block.aquarion-polymer-wall.description = Защищает конструкции от вражеских снарядов, может отражать пули и лазерное оружие.
block.aquarion-huge-polymer-wall.name = Огромная полимерная стена
block.aquarion-huge-polymer-wall.description = Защищает конструкции от вражеских снарядов, может отражать пули и лазерное оружие.
block.aquarion-steel-wall.name = Стальная стена
block.aquarion-steel-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-huge-steel-wall.name = Огромная стальная стена
block.aquarion-huge-steel-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-nickel-wall.name = Никелевая стена
block.aquarion-nickel-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-cupronickel-wall.name = Медно-никелевая стена
block.aquarion-cupronickel-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-huge-cupronickel-wall.name = Огромная медно-никелевая стена
block.aquarion-huge-cupronickel-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-huge-nickel-wall.name = Большая никелевая стена
block.aquarion-huge-nickel-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-bauxite-barricade.name = Баррикада из боксита
block.aquarion-bauxite-barricade.description = Большая, бронированная стена, при разрушении которой разлетается кучка шипов.
block.aquarion-nickel-barricade.name = Баррикада из никеля
block.aquarion-nickel-barricade.description = Массивная стена, увеличивающая броню и здоровье ближайшим блокам.
block.aquarion-bauxite-wall.name = Бокситовая стена
block.aquarion-bauxite-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-huge-bauxite-wall.name = Большая бокситовая стена
block.aquarion-huge-bauxite-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-aluminum-wall.name = Алюминиивая стена
block.aquarion-aluminum-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-huge-aluminum-wall.name = Большая алюминиивая стена
block.aquarion-huge-aluminum-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-ferrosilicon-wall.name = Стена из Ферросилиция
block.aquarion-ferrosilicon-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-huge-ferrosilicon-wall.name = Большая стена из Ферросилиция
block.aquarion-huge-ferrosilicon-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-core-pike.name = Ядро: «Склон»
block.aquarion-core-pike.description = Ядро базы. Бронировано. После уничтожения, весь контакт с регионом теряется.
block.aquarion-core-cuesta.name = Ядро: «Хребет»
block.aquarion-core-cuesta.description = Ядро базы. Бронировано. После уничтожения, весь контакт с регионом теряется.
block.aquarion-point.name = Точка
block.aquarion-point.description = Выпускает рассеянный залп из перегретого материала.
block.aquarion-sentry.name = Часовой
block.aquarion-sentry.description = Сбивает приближающиеся медленные пули. Не может стрелять по врагам.
block.aquarion-vector.name = Вектор
block.aquarion-vector.description = Стреляет залпами массивных дисков по врагам.
block.aquarion-dislocate.name = Смещение
block.aquarion-dislocate.description = Выстреливает град снарядов по врагам.
block.aquarion-truncate.name = Срезание
block.aquarion-truncate.description = Выстреливает липкие гранаты, которые выделяют взрывоопасный газ метана.
block.aquarion-thrash.name = Разорение
block.aquarion-thrash.description = Выстреливает большой нестабильный снаряд по врагам.
block.aquarion-flagellate.name = Бичевание
block.aquarion-flagellate.description = Выстреливает огромные дальнобойные нестабильные снаряды по врагам.
block.aquarion-focus.name = Фокус
block.aquarion-focus.description = Выпускает концентрированные лучи частиц во врагов.
block.aquarion-aftershock.name = Афтершок
block.aquarion-aftershock.description = Выстреливает огромный взрыв расплавленного осколка по врагам.
block.aquarion-douse.name = Доза
block.aquarion-douse.description = Распрыскивает жидкости на врагов.
block.aquarion-pelt.name = Шкура
block.aquarion-pelt.description = Выстреливает во врагов пронзающим копьем.
block.aquarion-refraction.name = Преломление
block.aquarion-refraction.description = Фокусирует разрушительный лазер по летающим врагам.
block.aquarion-refraction.details = Я хорошо ее помню, но эта другая... С возвращением Преломление.
block.aquarion-foment.name = Подстрекатель
block.aquarion-foment.description = На умеренном расстоянии стреляет самонаводящимися снарядами по врагам.
block.aquarion-confront.name = Противостояние
block.aquarion-confront.description = Стреляет градом.
block.aquarion-grace.name = Милостивость
block.aquarion-grace.description = Стреляет по врагам заряженными артиллерийскими снарядами. Для работы требуется энергия.
block.aquarion-redact.name = Редакция
block.aquarion-redact.description = Стреляет по врагам мощными дальнобойными снарядами.
block.aquarion-maelstrom.name = Водоворот
block.aquarion-maelstrom.description = Выпускает шквал слабых самонаводящихся пуль по воздушным врагам. Работает на дыме.
block.aquarion-torrefy.name = Обжаривание
block.aquarion-torrefy.description = Выстреливает мощную струю плазмы по врагам.
block.aquarion-torrefy.details = Нужно ли говорить больше?
block.aquarion-buzzsaw.name = Пушка с пилой
block.aquarion-buzzsaw.description = Турель с прикрепленной пилой. Используется для уничтожения мусора, деревьев и обломков юнитов.
block.aquarion-mend-pyre.name = Ремонтирующий распространитель
block.aquarion-mend-pyre.description = Восстанавливает конструкции с течением времени. Необходим для поддержания целостности труб.
block.aquarion-mend-pyre.details = Не использует магму для работы.
block.aquarion-mend-pylon.name = Ремонтирующий пилон
block.aquarion-mend-pylon.description = Восстанавливает конструкции с течением времени. Необходим для поддержания целостности труб. Для работы использует дым.
block.aquarion-magma-tap.name = Магмовый экстрактор
block.aquarion-magma-tap.description = Извлекает магму из вулканических трещин.
block.aquarion-magma-diffuser.name = Разделитель магмы
block.aquarion-magma-diffuser.description = Отделяет смесь материалов от магмы.
block.aquarion-plasma-extractor.name = Плазменный экстрактор
block.aquarion-plasma-extractor.description = Копает минералы из стен.
block.aquarion-slag-refinement-array.name = Платформа очистки шлака
block.aquarion-slag-refinement-array.description = Очищает шлак в несколько различных ресурсов.
block.aquarion-beam-bore.name = Лучевой бур
block.aquarion-beam-bore.description = Добывает материалы из стен, можно усилить дымом.
block.aquarion-drill-derrick.name = Буровая вышка
block.aquarion-drill-derrick.description = Бурит поверхностные месторождения. Для работы требуется дым.
block.aquarion-pin-drill.name = Штифтовая дрель
block.aquarion-pin-drill.description = Бурит поверхностные месторождения.
block.aquarion-fume-separator.name = Сепаратор дыма
block.aquarion-fume-separator.description = Разделяет разнообразные ресурсы из дыма.
block.aquarion-fume-filter.name = Дымовой фильтр
block.aquarion-fume-filter.description = Фильтрует пары вулканических выбросов. Устанавливается только на вентиляционные отверстия.
block.aquarion-harvester.name = Комбайн
block.aquarion-harvester.description = Бурит наземную руду с постоянной скоростью. Производительность можно повысить с помощью воды.
block.aquarion-centrifugal-pump.name = Центробежный насос
block.aquarion-centrifugal-pump.description = Высасывает жидкости.
block.aquarion-inlet.name = Подводный компрессор
block.aquarion-inlet.description = Сжимает окружающую гидросферу для промышленного использования.
block.aquarion-inlet.details = По понятным причинам может использоваться только под водой.
block.aquarion-inlet-array.name = Массив впускных отверстий
block.aquarion-inlet-array.description = Повышает давление окружающей гидросферы для промышленного использования. Требует электроэнергии для работы.
block.aquarion-inlet-array.details = Может использоваться только в подводных средах по очевидным причинам.
block.aquarion-air-intake.name = Воздушный компрессор
block.aquarion-air-intake.description = Сжимает окружающую атмосферу для промышленного использования.
block.aquarion-air-intake.details = По очевидным причинам можно использовать на суше.
block.aquarion-azurite-kiln.name = Азуритовая печь
block.aquarion-azurite-kiln.description = Плавит азурит с получением меди и гидроксида.
block.aquarion-power-supply-unit.name = Блок питания
block.aquarion-power-supply-unit.description = Снабжает электроэнергией конструкции впереди.
block.aquarion-energy-bank.name = Банк энергии
block.aquarion-energy-bank.description = Хранит небольшое количество электроэнергии.
block.aquarion-ferric-macerator.name = Железный макератор
block.aquarion-ferric-macerator.description = Измельчает железные полы большим количеством воды.
block.aquarion-graphite-concentrator.name = Концентратор графита
block.aquarion-graphite-concentrator.description = Концентрирует небольшое количество графита из метаморфных пород, таких как базальт.
block.aquarion-towanite-reduction-vat.name = Восстанивительный бассейн тованита 
block.aquarion-towanite-reduction-vat.description = Восстанавливает тованит до его основных компонентов. Для работы требуется дым.
block.aquarion-brine-mixer.name = Смеситель соляного раствора
block.aquarion-brine-mixer.description = Производит соляной раствор путем смешивания больших количеств воды и соли.
block.aquarion-arc-furnace.name = Электродуговая печь
block.aquarion-arc-furnace.description = Использует экстремальное напряжение для нагрева песка. Производит кремний и кислород.
block.aquarion-silicon-oxidator.name = Окислитель кремния
block.aquarion-silicon-oxidator.description = Реагирует кремний с кислородом. Производит песок.
block.aquarion-desulferization-assembly.name = Узел десульфуризации
block.aquarion-desulferization-assembly.description = Извлекает серу из жидкой нефти, выделяя метан как побочный продукт. Требует тепла для работы.
block.aquarion-blast-furnace.name = Доменная печь
block.aquarion-blast-furnace.description = Производит сталь из большого количества железной руды, кислорода и угля. Эффективность можно повысить с помощью тепла и охладителя.
block.aquarion-ferrosilicon-foundry.name = Литейный завод ферросилиция
block.aquarion-ferrosilicon-foundry.description = Сплавляет железо и кремний. Для работы требуется гидроксид и магма.
block.aquarion-ferrosilicon-foundry.details = Затянутый процесс. Для обеспечения поставок в нужном количестве может потребоваться несколько заводов.
block.aquarion-bauxite-centrifuge.name = Бокситовая центрифуга
block.aquarion-bauxite-centrifuge.description = Отделяет такие элементы, как алюминий и железо, от боксита с помощью центробежной силы.
block.aquarion-vacuum-freezer.name = Вакуумная морозилка
block.aquarion-vacuum-freezer.description = Охлаждает загрязненную воду выше точки росы, заставляя примеси отделяться.
block.aquarion-metaglass-annealing-furnace.name = Печь для отжига метастекла
block.aquarion-metaglass-annealing-furnace.description = Отжигает песок, до состояния стекла, и свинец для получения метастекла. Для работы необходимо тепло.
block.aquarion-atmospheric-centrifuge.name = Атмосферная центрифуга
block.aquarion-atmospheric-centrifuge.description = Разделяет компоненты воздуха центробежной силой.
block.aquarion-algal-terrace.name = Водорослевая терраса
block.aquarion-algal-terrace.description = Выращивает бактериальные колонии, которые для работы необходимо поместить на богатую питательными веществами почву.
block.aquarion-algal-terrace.details = Даже в самых странных средах. Ся внеш ворвалес эта нас присутствовать. Даже в вакууме пространства.
block.aquarion-fume-mixer.name = Смеситель дыма
block.aquarion-fume-mixer.description = Смешивает компоненты дыма, неэффективно.
block.aquarion-pump-assembly.name = Насосная система
block.aquarion-pump-assembly.description = Извлекает большое количество жидкостей из плиток под ней. Требует электроэнергии для работы.
block.aquarion-payload-pad.name = Стартовая площадка груза
block.aquarion-payload-pad.description = Запускает грузы на блоки в обозначенном направлении.
block.aquarion-intialization-bay.name = Залив инициализации
block.aquarion-intialization-bay.description = Активирует юниты чрезвычайно быстро с только электроэнергией.
block.aquarion-payload-displacer.name = Залив смещения груза
block.aquarion-payload-displacer.description = Срывает блоки с фундамента, чтобы поместить их на сети груза.
block.aquarion-payload-distributor.name = Распределитель груза
block.aquarion-payload-distributor.description = Перемещает грузы в нескольких различных направлениях.
block.aquarion-convection-heater.name = Конвекционный нагреватель
block.aquarion-convection-heater.description = Использует тепловую конвекцию воды для производства большого количества тепла.
block.aquarion-solid-heater.name = Твердотопливный нагреватель сгорания
block.aquarion-solid-heater.description = Сжигает горючие твердые вещества с кислородом для производства тепла
block.aquarion-combustion-heater.name = Жидкостный нагреватель сгорания
block.aquarion-combustion-heater.description = Использует тепловые отходы сгорания жидкости для производства небольшого количества тепла.
block.aquarion-combustion-heater.details = ВНЕШНИЙ КОММЕНТАРИЙ:\nATHKY121: LGC\nНельзя ли объединить жидкостные и твердотопливные нагреватели в одну структуру?\n ARKTCK...\nЭта практика неправильна, так как твердые реакции намного более контролируемы, чем реакции на основе жидкостей.
block.aquarion-basic-heat-exchanger.name = Теплообменник
block.aquarion-basic-heat-exchanger.description = Кипятит воду с внешним теплом, производя небольшое количество электроэнергии с остаточным теплом. Может взорваться, если пар достигнет критических уровней.
block.aquarion-basic-heat-exchanger.details = ВНЕШНИЙ КОММЕНТАРИЙ:\nATHKY034: ARKTCK\n Конструкция неправильная...\nЕдинственная причина, по которой это все еще используется, это то, что это намного менее ресурсоемко, чем его...\n Аналог.
block.aquarion-thermal-cracking-unit.name = Установка термической дестиляции
block.aquarion-thermal-cracking-unit.description = Разлагает сырую нефть на более простые компоненты для дальнейшей очистки. Требует электроэнергии и тепло.
block.aquarion-acuminite-degredation-array.name = Массив разложения акуминита
block.aquarion-acuminite-degredation-array.description = Разлагает кристаллы акуминита на основные компоненты, включая стронций, алюминий и фтор.
block.aquarion-galena-crucible.name = Галеновый тигель
block.aquarion-galena-crucible.description = Разбирает кристаллы галенита на основные компоненты, включая медь, свинец и серу.
block.aquarion-spore-processor.name = Обработчик спор
block.aquarion-spore-processor.description = Смешивает споры в суспензию.
block.aquarion-coal-liquefactor.name = Угольный сжижитель
block.aquarion-coal-liquefactor.description = Создает синтетическое масло из угля, кислорода и тепла.
block.aquarion-solid-boiler.name = Твердотопливный бойлер
block.aquarion-solid-boiler.description = Кипятит воду, путем сжигания твердого топлива.
block.aquarion-polymer-press.name = Полимерный пресс
block.aquarion-polymer-press.description = Использует экстремальное тепло и давление для полимеризации жидкой нефти.
block.aquarion-solid-boiler.details = Ожидали чего-то другого?)
block.aquarion-crate.name = Ящик
block.aquarion-crate.description = Хранит небольшое количество ресурсов. Требуются разгружаютели для аццесса к этим сохраненным материалам.
block.aquarion-gasifier.name = Газификатор
block.aquarion-gasifier.description = Нагревает биологическую суспензию с образованием рафинированного кокса и остаточного пара.
block.aquarion-lantern.name = Лампа
block.aquarion-lantern.description = Использует легковоспламеняющиеся жидкости или газы для производства большого количества света.
block.aquarion-deflector-well.name = Колодец отражателя
block.aquarion-deflector-well.description = Использует архаичные технологии для создания щита, который перенаправляет входящие пули.
block.aquarion-deflector-well.details = [#3e1313]FETCH: ОШИБКА ПРОГРАММЫ[]\n[#3e1313]Тип файла несовместим с вашим ПО\nДля доступа к деталям этого файла см. сведения о производстве...[]
block.aquarion-outlet.name = Энергитический вывод
block.aquarion-outlet.description = Передает подключенную энергию на блок перед ним. Требуется для энергоемких конструкций. Может потребоваться несколько блоков из-за ограниченной пропускной способности. \n Будет постоянно потреблять энергию, даже если поставляемая структура находится в автономном режиме.[]
block.aquarion-pylon.name = Энергитический пилон
block.aquarion-pylon.description = Подключает энергию к определенным структурам. Невозможно подключить к чему-либо, непосредственно потребляющему электроэнергию.
block.aquarion-pylon.details = P.S Подключается к батареям.
block.aquarion-heat-engine.name = Тепловой двигатель
block.aquarion-heat-engine.description = Использует геотермальное тепло для производства электроэнергии. Выводит шлак как побочный продукт.
block.aquarion-hydroxide-reactor.name = Гидроксидный реактор
block.aquarion-hydroxide-reactor.description = Производит умеренное количество энергии за счет пузырьков [violet]​​Гидроксида[] в [blue]Воду[]. \n Побочные продукты считаются ненужными для наших миссий и поэтому будут выбрасываться в окружающую среду.
block.aquarion-fume-engine.name = Двигатель на дыме
block.aquarion-fume-engine.description = Производит умеренное количество энергии путем сжигания [tan]Дыма[]. [scarlet]Взрываопасен.[]
block.aquarion-solar-generator.name = Солнечный генератор
block.aquarion-solar-generator.description = Производит энергию из солнечной радиации. Для запасания энергии на ночь используйте батареи.\n [scarlet]Умеренно взрывоопасны, размещайте осторожно.[]
block.aquarion-advanced-solar-generator.name = Продвинутый солнечный генератор
block.aquarion-advanced-solar-generator.description = Производит электроэнергию от солнечной радиации и штормовых ветров. Устойчив к суровым условиям, но [scarlet] Крайне взрывоопасен.[]
block.aquarion-turbine-dynamo.name = Паровая турбина
block.aquarion-turbine-dynamo.description = Производит умеренное количество энергии за счет вращения турбины с находящейся под давлением [white]пара[].
block.aquarion-capacitor-bank.name = Массив конденсаторов
block.aquarion-capacitor-bank.description = Сохраняет умеренное количество энергии. Не может подключаться к зданиям, связанным с электроснабжением, из-за близости.
block.aquarion-ion-battery.name = Ионные аккумуляторы
block.aquarion-ion-battery.description = Хранит большое количество энергии. Не может подключаться к зданиям, связанным с электроснабжением, из-за близости.
block.aquarion-siphon-tank.name = Бак
block.aquarion-siphon-tank.description = Хранит большой обьем жидкости. [#c61e1e]ПЛАВИТСЯ ПРИ ВЫСОКИХ ТЕМПЕРАТУРАХ!
block.aquarion-siphon-underflow.name = Клапан сифона
block.aquarion-siphon-underflow.description = Понижает жидкости в сторону входа, будет нижать жидкости вперед, если невозможно понижать жидкости в сторону. [#c61e1e]ВАЛИТСЯ ПРИ ВЫСОКОЙ ТЕМПЕРАТУРЕ.
block.aquarion-siphon-reservoir.name = Резервуар
block.aquarion-siphon-reservoir.description = Хранит большооооооооое количество жидкости..
block.aquarion-siphon.name = Сифон
block.aquarion-siphon.description = Перемещает жидкости вперёд. Не протекает.
block.aquarion-pulse-siphon.name = Импульсный сифон
block.aquarion-pulse-siphon.description = Перемещает жидкости вперед. Не протекает.
block.aquarion-siphon-router.name = Сифонный маршрутизатор
block.aquarion-siphon-router.description = Равномерно распределяет жидкости по всем направлениям.
block.aquarion-siphon-junction.name = Сифонный перекрёсток
block.aquarion-siphon-junction.description = Действует как мост для двух пересекающихся сифонов.
block.aquarion-siphon-bridge.name = Сифонный мост
block.aquarion-siphon-bridge.description = Может перемещать жидкости на любой местностью и зданиями. Имеет меньшую длину, чем похожие блоки
block.aquarion-pulse-siphon-bridge.name = Импульсный сифонный мост
block.aquarion-pulse-siphon-bridge.description = Может перемещать жидкости по зданиям и местности. Имеет больший радиус действия, чем его аналоги, [#c61e1e]ПЛАВИТСЯ ПРИ ВЫСОКИХ ТЕМПЕРАТУРАХ!
block.aquarion-heat-channel.name = Теплоканал
block.aquarion-heat-channel.description = Передает тепло блокам впереди себя.
block.aquarion-cupronickel-alloying-crucible.name = Тигель сплавления медно-никеля
block.aquarion-cupronickel-alloying-crucible.description = Сплавляет медь и никель для производства медно-никелевого сплава. Требует воздуха для работы. Можно усилить теплом.
block.aquarion-brine-electrolysis-manifold.name = Коллектор электролиза соляного раствора
block.aquarion-brine-electrolysis-manifold.description = Электролизирует соляной раствор на более чистые компоненты. Такие как хлор, водород и гидроксид.
block.aquarion-fume-seperator.name = Сепаратор дыма
block.aquarion-fume-seperator.description = Расщепляет [#83746b]Дым[] на некоторые из его полезных компонентов.
block.aquarion-lead-burner.name = Сжигатель свинца
block.aquarion-lead-burner.description = Использует экзотермическую окислительную реакцию между свинцом и воздухом для производства электроэнергии.
block.aquarion-geothermal-evaporator.name = Геотермальный испаритель
block.aquarion-geothermal-evaporator.description = Использует геотермальное тепло для кипячения галидной воды в соляную кислоту и соль.
block.aquarion-nuetralization-vessel.name = Сосуд нейтрализации
block.aquarion-nuetralization-vessel.description = Использует нейтрализацию кислоты с основным гидроксидом для производства галидной воды и тепла.
block.aquarion-scrap-centrifuge.name = Центрифуга для лома
block.aquarion-scrap-centrifuge.description = Использует центробежную силу для разделения некоторых основных материалов лома.
block.aquarion-ultramafic-refinery.name = Ультрамафическая очистка
block.aquarion-ultramafic-refinery.description = Измельчает серпентин на его основные материалы.
block.aquarion-biotite-leaching-vessel.name = Сосуд выщелачивания биотита
block.aquarion-biotite-leaching-vessel.description = Использует соляную кислоту для разложения биотита на более простые материалы.
block.aquarion-electrolysis-vat.name = Водный электролизер
block.aquarion-electrolysis-vat.description = Использует электролиз для разделения воды на газообразный водород и кислород.
block.aquarion-infomatic.name = Информационный блок
block.aquarion-infomatic.description = Ты можешь суда что-то записать и оно будет отображаться в игре. Это может быть полезно для создания заметок или просто для развлечения.
block.aquarion-toggler.name = Переключатель
block.aquarion-toggler.description = Включает или выключает блоки.
block.aquarion-splitter.name = Разветвитель
block.aquarion-splitter.description = Разделяет входящие ресурсы на несколько выходов.
block.aquarion-binary-channel.name = Двоичный канал
block.aquarion-binary-channel.description = Разделяет входящие ресурсы на два выхода.
block.aquarion-zinc-wall.name = Цинковая стена
block.aquarion-zinc-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-huge-zinc-wall.name = Большая цинковая стена
block.aquarion-huge-zinc-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-bauxite-wall.name = Бокситовая стена
block.aquarion-bauxite-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-huge-bauxite-wall.name = Большая бокситовая стена
block.aquarion-huge-bauxite-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-bauxite-barricade.name = Бокситовая баррикада
block.aquarion-bauxite-barricade.description = Массивная стена, увеличивающая броню и здоровье ближайшим блокам.
block.aquarion-nickel-wall.name = Никельская стена
block.aquarion-nickel-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-huge-nickel-wall.name = Большая никельская стена
block.aquarion-huge-nickel-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-nickel-barricade.name = Никельская баррикада
block.aquarion-nickel-barricade.description = Массивная стена, увеличивающая броню и здоровье ближайшим блокам.
block.aquarion-solar-boiler.name = Солнечный бойлер
block.aquarion-solar-boiler.description = Кипятит воду с помощью солнечной энергии. Требует воды для работы.
block.aquarion-siphon-vessel.name = Сосуд сифона
block.aquarion-siphon-vessel.description = Хранит большое количество жидкости для использования с сифонами.
block.aquarion-siphon-gulley.name = Сифонный овраг
block.aquarion-siphon-gulley.description = Сифонный мост, который может перемещать жидкости на большие расстояния, но имеет ограниченную пропускную способность.
block.aquarion-steel-conveyor.name = Стальная конвейерная лента
block.aquarion-steel-conveyor.description = Быстро перемещает ресурсы по всей базе. Требует стали для производства.
block.aquarion-steel-router.name = Стальная маршрутизация
block.aquarion-steel-router.description = Обеспечивает равномерное распределение предметов в трех направлениях со стальных конвейеров. Требует стали для производства.
block.aquarion-drilling-rig.name = Буровая установка
block.aquarion-drilling-rig.description = Массивная буровая установка, используемая для добычи промышленных объемов ресурсов из подземных месторождений. Для работы требует наличия дымки. Может быть ускорена за счет подачи аргона.
block.aquarion-metaglass-pulverizer.name = Размельчитель метастекла
block.aquarion-metaglass-pulverizer.description = Размельчает метастекло на свинец и кремний. Производит немного кислорода в качестве побочного продукта.
block.aquarion-cooling-tower.name = Охладительная башня
block.aquarion-cooling-tower.description = Использует энергию для охлаждения дыма до воды. Тепло передается на одну сторону.
block.aquarion-haze-cracking-unit.name = Установка дестиляции тумана
block.aquarion-haze-cracking-unit.description = Разлагает туман на его основные компоненты, такие как вода, кислород и углерод. Требует тепла для работы.
block.aquarion-pipe.name = Труба
block.aquarion-pipe.description = Перемещает жидкости с невероятной скоростью. Не проливается.
block.aquarion-pipe.details = НЕ ПЛАВИТСЯ!!!
block.aquarion-improvised-explosive.name = Самодельная бомба
block.aquarion-improvised-explosive.description = Грубо изготовленное взрывное устройство, предназначенное для разрушения местности. Может разрушать некоторые материалы и здания. Использовать с осторожностью.
block.aquarion-construction-tower.name = Башня строительства
block.aquarion-construction-tower.description = Помогает в строительстве и реконструкции блоков на большом расстоянии. Может быть использована для помощи в производстве юнитов и реконструкции структур.
block.aquarion-mend-substation.name = Ремонтирующая подстанция
block.aquarion-mend-substation.description = Ремонтирует конструкции со временем. Требует тумана и электроэнергии для поддержания большой области. Может играть значительную оборонительную роль в контроле толпы.
block.aquarion-mend-substation.details = Гига-злой.
