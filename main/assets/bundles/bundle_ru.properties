aquarion.menu.open_profile = Профиль
aquarion.menu.desc_creator = Слушай, чувак, я создал Aquarion, \nЯ люблю Aquarion, потому что \nЯ сделал Aquarion, и \nЯ так сильно люблю Aquarion, \nЯ создаю Aquarion, и \nЯ просто так сильно люблю Aquarion, потому что \nЯ его сделал. \nДа, это я сделал Aquarion
aquarion.menu.desc_NikolayKot = Я програмист. \n\nЯ перевел этот мод на русский, \nсделай проверку обновленний и сделал то что вы сейчас читаете и смотрите других авторов. \nА еще сделал музыку для мода.
aquarion.menu.desc_Thinkerdoodle = Оранжевая ящерица. В свободное время любит составлять карты. \n\nСоздал локации: Заражённая расщелина, Выжженные пустоши, Грибные тропики, Прибрежная лощина, Рассоловое плато, Галена-Фриндж и Прибрежный комплекс.
aquarion.menu.desc_Vire = Я создал несколько карт (какие именно — предлагаю читателю выяснить самостоятельно), а также отвечаю за текущую структуру дерева технологий; кроме того, я сделал кое-что ещё, но было бы скучно раскрывать все сюрпризы.\n[darkgray]Если вы найдёте опечатки или другие ошибки в сборке, напишите мне в дискорде.
aquarion.menu.desc_ItsKirby = Я создаю Java-модификации для Mindustry. \n\nРазобрался с кучей случайных задач для Aquarion — от визуального оформления планеты до контроля качества спрайтов. \n\nСпасибо, что пришли на мою лекцию.
aquarion.menu.desc_Alecthe2nd = Java-моддер, который с удовольствием погружается в кодовые базы. \n\nРешил различные ошибки и проблемы, которые Twcash еще не смогли решить самостоятельно.
aquarion.menu.desc_OwO = Я — памятник. \nВсем вашим грехам. \nПрисоедините свой голос к вечному \nХору и воспевайте победу. \nЯ — случайный Java-моддер, а также работаю над переводом на испанский язык.
aquarion.menu.desc_Leo = none
aquarion.menu.desc_Mythril = Я написал музыку для Aquarion! Раньше я делал моды для Mindustry, но не знаю, когда вернусь к этому.\n\nНе спрашивайте, почему здесь оказался внезапно обретший сознание предмет из Terraria.
