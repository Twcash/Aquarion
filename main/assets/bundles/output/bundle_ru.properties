
## BLOCKS
block.aquarion-petroleum-engine.name = Нефтяной двигатель
block.aquarion-petroleum-engine.description = Потребляет большое количество жидкого керосина и газообразного кислорода, чтобы преобразовать силу химического сгорания в энергию.
block.aquarion-sealed-conveyor.name = Герметичный конвейер
block.aquarion-sealed-conveyor.description = Водостойкий конвейер, который перемещает предметы вперед с умеренной скоростью.
block.aquarion-armored-sealed-conveyor.name = Бронированный герметичный конвейер
block.aquarion-armored-sealed-conveyor.description = Водостойкий конвейер, который перемещает предметы вперед с умеренной скоростью. Не принимает не конвеерный вход по бокам.
block.aquarion-manganese-rail.name = Марганцевый рельс
block.aquarion-manganese-rail.description = Перевозит предметы пачками вперед. Принимает предметы сзади и выгружает их в трёх направлениях спереди. Для обеспечения максимальной производительности требуется несколько точек погрузки и разгрузки.
block.aquarion-sealed-router.name = Герметичный маршрутизатор
block.aquarion-sealed-router.description = Необходимое зло. Может распределять предметы из нескольких входов и выходов во всех направлениях, не рекомендуется ставить возле производственных зданий.
block.aquarion-sealed-junction.name = Герметичный перекрёсток
block.aquarion-sealed-junction.description = Действует как мост для двух пересекающихся конвейерных лент
block.aquarion-cache.name = Склад
block.aquarion-cache.description = Хранит большое изобилие предметов.
block.aquarion-cache.details = Удобен для сортировки предметов из заводов с несколькими предметами на выход.
block.aquarion-sealed-unloader.name = Герметичный разгрузчик
block.aquarion-sealed-unloader.description = Разгружает предметы из построек позади.
block.aquarion-sealed-sorter.name = Герметичный сортировщик
block.aquarion-sealed-sorter.description = Водостойкий сортировщик, который выводит фильтруемые предметы вперед, а все остальные предметы по бокам.
block.aquarion-sealed-inverted-sorter.name = Герметичный инвертирующий сортировщик
block.aquarion-sealed-inverted-sorter.description = Водонепроницаемый сортировщик, который выводит отфильтрованные предметы вперёд, а все остальные предметы по бокам.
block.aquarion-sealed-distributor.name = Герметичный распределитель
block.aquarion-sealed-distributor.description = Водонепроницаемый сортировщик, который выводит отфильтрованные предметы вперед, а все остальные по бокам.
block.aquarion-mass-distributor.name = Массовый распределитель
block.aquarion-mass-distributor.description = Сомнительно большой водонепроницаемый маршрутизатор, распределяющий входящие предметы поровну по 15 направлениям.
block.aquarion-sealed-overflow.name = Герметичный избыточный затвор
block.aquarion-sealed-overflow.description = Водостойкий избыточный затвор, выводит предметы по бокам только если противоположная от входа сторона не может принимать предметы.
block.aquarion-sealed-underflow.name = Герметичный избыточный шлюз
block.aquarion-sealed-underflow.description = Водостойкий избыточный шлюз, выводит предметы прямо только если боковые стороны не могут принимать предметы.
block.aquarion-relay.name = Передатчик
block.aquarion-relay.description = Соединяет электрические сети. Поглощает небольшое количество энергии из-за плотности воды.
block.aquarion-build-cairn.name = Строительная вышка
block.aquarion-build-cairn.description = Помогает в строительстве и деконструкции построек, может также использоваться в производстве юнитов.
block.aquarion-construction-tower.name = Строительная башня
block.aquarion-construction-tower.description = Помогает в строительстве и реконструкции построек на дальнем расстоянии. Может использоваться для поддержки производства юнитов и восстановления структур.
block.aquarion-force-generator.name = Генератор силы
block.aquarion-force-generator.description = Создаёт слабое поле, защищающее конструкции. В основном используется для защиты нестабильных строений от опасной погоды.
block.aquarion-polymer-wall.name = Полимерная стена
block.aquarion-polymer-wall.description = Защищает конструкции от вражеских снарядов, может отклонять пули и лазерное оружие.
block.aquarion-huge-polymer-wall.name = Большая полимерная стена
block.aquarion-huge-polymer-wall.description = Защищает конструкции от вражеских снарядов, может отклонять пули и лазерное оружие.
block.aquarion-steel-wall.name = Стальная стена
block.aquarion-steel-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-huge-steel-wall.name = Большая стальная стена
block.aquarion-huge-steel-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-zinc-wall.name = Цинковая стена
block.aquarion-zinc-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-nickel-wall.name = Никелевая стена
block.aquarion-nickel-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-cupronickel-wall.name = Купроникелевая стена
block.aquarion-cupronickel-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-huge-cupronickel-wall.name = Большая купроникелевая стена
block.aquarion-huge-cupronickel-wall.description = Защищает конструкции от вражеских снарядов.
block.aquarion-huge-nickel-wall.name = Большая никелевая стена
block.aquarion-huge-nickel-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-bauxite-barricade.name = Баррикада из боксита
block.aquarion-bauxite-barricade.description = Большая, бронированная стена, при разрушении которой разлетаются шипы.
block.aquarion-nickel-barricade.name = Баррикада из никеля
block.aquarion-nickel-barricade.description = Массивная стена, увеличивающая броню и здоровье ближайшим блокам.
block.aquarion-bauxite-wall.name = Бокситовая стена
block.aquarion-bauxite-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-huge-bauxite-wall.name = Большая бокситовая стена
block.aquarion-huge-bauxite-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-aluminum-wall.name = Алюминиевая стена
block.aquarion-aluminum-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-huge-aluminum-wall.name = Большая алюминиевая стена
block.aquarion-huge-aluminum-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-ferrosilicon-wall.name = Стена из ферросилиция
block.aquarion-ferrosilicon-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-huge-ferrosilicon-wall.name = Большая стена из ферросилиция
block.aquarion-huge-ferrosilicon-wall.description = Защищает постройки от вражеских снарядов.
block.aquarion-core-pike.name = Ядро: «Склон»
block.aquarion-core-pike.description = Ядро базы. Бронировано. После уничтожения весь контакт с регионом теряется.
block.aquarion-core-cuesta.name = Ядро: «Хребет»
block.aquarion-core-cuesta.description = Ядро базы. Бронировано. После уничтожения весь контакт с регионом теряется.
block.aquarion-point.name = Точка
block.aquarion-point.description = Выпускает рассеянный залп из перегретого материала.
block.aquarion-sentry.name = Часовой
block.aquarion-sentry.description = Сбивает приближающиеся медленные пули. Не может стрелять по врагам.
block.aquarion-vector.name = Вектор
block.aquarion-vector.description = Стреляет залпами массивных дисков по врагам.
block.aquarion-dislocate.name = Дислокация
block.aquarion-dislocate.description = Выпускает шквал снарядов по врагам.
block.aquarion-truncate.name = Усечение
block.aquarion-truncate.description = Выпускает липкие гранаты, которые высвобождают взрывоопасный метан.
block.aquarion-thrash.name = Разрушитель
block.aquarion-thrash.description = Выпускает большой нестабильный снаряд по врагам.
block.aquarion-flagellate.name = Плетель
block.aquarion-flagellate.description = Выпускает гигантские дальнобойные нестабильные снаряды по врагам.
block.aquarion-focus.name = Фокус
block.aquarion-focus.description = Выпускает концентрированные лучи частиц во врагов.
block.aquarion-aftershock.name = Послесмяг
block.aquarion-aftershock.description = Выпускает массивную волну расплавленных осколков по врагам.
block.aquarion-douse.name = Доза
block.aquarion-douse.description = Распрыскивает жидкости на врагов.
block.aquarion-pelt.name = Шкура
block.aquarion-pelt.description = Выстреливает во врагов пронзающим копьём.
block.aquarion-refraction.name = Преломление
block.aquarion-refraction.description = Фокусирует разрушительный лазер по летающим врагам.
block.aquarion-refraction.details = Я хорошо её помню, но эта другая... С возвращением Преломление.
block.aquarion-foment.name = Подстрекатель
block.aquarion-foment.description = На умеренном расстоянии стреляет самонаводящимися снарядами по врагам.
block.aquarion-confront.name = Противостояние
block.aquarion-confront.description = Стреляет градом.
block.aquarion-grace.name = Милостивость
block.aquarion-grace.description = Стреляет по врагам заряженными артиллерийскими снарядами. Для работы требуется энергия.
block.aquarion-redact.name = Редакция
block.aquarion-redact.description = Стреляет по врагам мощными дальнобойными снарядами.
block.aquarion-maelstrom.name = Водоворот
block.aquarion-maelstrom.description = Выпускает шквал слабых самонаводящихся пуль по воздушным врагам. Работает на дыме.
block.aquarion-torrefy.name = Торрефай
block.aquarion-torrefy.description = Выпускает массивную плазменную струю по врагам.
block.aquarion-torrefy.details = Нужны ли ещё слова?
block.aquarion-buzzsaw.name = Циркулярка
block.aquarion-buzzsaw.description = Турель с прикреплённой пилой. Используется для уничтожения мусора, деревьев и обломков юнитов.
block.aquarion-mend-pyre.name = Ремонтирующий распространитель
block.aquarion-mend-pyre.description = Восстанавливает конструкции с течением времени. Необходим для поддержания целостности труб.
block.aquarion-mend-pyre.details = Не использует магму для работы.
block.aquarion-mend-pylon.name = Ремонтирующий пилон
block.aquarion-mend-pylon.description = Восстанавливает конструкции с течением времени. Необходим для поддержания целостности труб. Для работы использует дым.
block.aquarion-mend-substation.name = Ремонтная подстанция
block.aquarion-mend-substation.description = Восстанавливает конструкции с течением времени. Требует дыма и энергии для поддержания большой зоны. Может играть значительную наступательную роль в контроле толпы.
block.aquarion-mend-substation.details = Гига-зло.
block.aquarion-magma-tap.name = Магмовый экстрактор
block.aquarion-magma-tap.description = Извлекает магму из вулканических трещин.
block.aquarion-magma-diffuser.name = Разделитель магмы
block.aquarion-magma-diffuser.description = Отделяет смесь материалов от магмы.
block.aquarion-plasma-extractor.name = Плазменный экстрактор
block.aquarion-plasma-extractor.description = Копает минералы из стен.
block.aquarion-slag-refinement-array.name = Slag Refinement Platform
block.aquarion-slag-refinement-array.description = Refines slag into several different resources.
block.aquarion-beam-bore.name = Лучевой бур
block.aquarion-beam-bore.description = Добывает материалы из стен, можно усилить дымом.
block.aquarion-drill-derrick.name = Буровая вышка
block.aquarion-drill-derrick.description = Бурит поверхностные месторождения. Для работы требуется дым.
block.aquarion-pin-drill.name = Штифтовая дрель
block.aquarion-pin-drill.description = Бурит поверхностные месторождения.
block.aquarion-fume-separator.name = Сепаратор дыма
block.aquarion-fume-separator.description = Отделяет различные ресурсы от дыма.
block.aquarion-fume-filter.name = Дымовой фильтр
block.aquarion-fume-filter.description = Фильтрует пары вулканических выбросов. Устанавливается только на вентиляционные отверстия.
block.aquarion-harvester.name = Комбайн
block.aquarion-harvester.description = Бурит наземную руду с постоянной скоростью. Производительность можно повысить с помощью воды.
block.aquarion-centrifugal-pump.name = Центробежный насос
block.aquarion-centrifugal-pump.description = Высасывает жидкости.
block.aquarion-inlet.name = Подводный компрессор
block.aquarion-inlet.description = Сжимает окружающую гидросферу для промышленного использования.
block.aquarion-inlet.details = По понятным причинам может использоваться только под водой.
block.aquarion-inlet-array.name = Массив впусков
block.aquarion-inlet-array.description = Создаёт давление в окружающей гидросфере для промышленного использования. Требует энергию для работы.
block.aquarion-inlet-array.details = Может использоваться только в затоплённых средах.
block.aquarion-air-intake.name = Воздушный компрессор
block.aquarion-air-intake.description = Сжимает окружающую атмосферу для промышленного использования.
block.aquarion-air-intake.details = По очевидным причинам можно использовать на суше.
block.aquarion-azurite-kiln.name = Азуритовая печь
block.aquarion-azurite-kiln.description = Плавит азурит с получением меди и гидроксида.
block.aquarion-power-supply-unit.name = Блок питания
block.aquarion-power-supply-unit.description = Поставляет энергию строениям перед ним.
block.aquarion-energy-bank.name = Энергетический банк
block.aquarion-energy-bank.description = Хранит небольшое количество энергии.
block.aquarion-ferric-macerator.name = Ферромакератор
block.aquarion-ferric-macerator.description = Перемалывает ферритовые полы с большим количеством воды.
block.aquarion-graphite-concentrator.name = Концентратор графита
block.aquarion-graphite-concentrator.description = Концентрирует небольшое количество графита из метаморфических пород, таких как базальт.
block.aquarion-towanite-reduction-vat.name = Восстанивительный бассейн тованита 
block.aquarion-towanite-reduction-vat.description = Восстанавливает тованит до его основных компонентов. Для работы требуется дым.
block.aquarion-brine-mixer.name = Смеситель рассола
block.aquarion-brine-mixer.description = Производит рассол, смешивая большое количество воды и соли.
block.aquarion-arc-furnace.name = Дуговая печь
block.aquarion-arc-furnace.description = Использует экстремальное напряжение для нагрева песка. Производит кремний и кислород.
block.aquarion-silicon-oxidator.name = Окислитель кремния
block.aquarion-silicon-oxidator.description = Реагирует кремний с кислородом. Производит песок.
block.aquarion-desulferization-assembly.name = Установка десульфурации
block.aquarion-desulferization-assembly.description = Извлекает серу из жидкой нефти и выделяет метан как побочный продукт. Требует тепло.
block.aquarion-blast-furnace.name = Доменная печь
block.aquarion-blast-furnace.description = Производит сталь из большого количества ферроматериала, кислорода и угля. Эффективность можно повысить теплом и охладителем.
block.aquarion-ferrosilicon-foundry.name = Литейный завод ферросилиция
block.aquarion-ferrosilicon-foundry.description = Сплавляет железо и кремний. Для работы требуется гидроксид и магма.
block.aquarion-ferrosilicon-foundry.details = Затянутый процесс. Для обеспечения поставок в нужном количестве может потребоваться несколько заводов.
block.aquarion-bauxite-centrifuge.name = Бокситовая центрифуга
block.aquarion-bauxite-centrifuge.description = Отделяет такие элементы, как алюминий и железо, от боксита с помощью центробежной силы.
block.aquarion-vacuum-freezer.name = Вакуумная морозилка
block.aquarion-vacuum-freezer.description = Охлаждает загрязненную воду выше точки росы, заставляя примеси отделяться.
block.aquarion-metaglass-annealing-furnace.name = Печь для отжига метастекла
block.aquarion-metaglass-annealing-furnace.description = Отжигает песок, до состояния стекла, и свинец для получения метастекла. Для работы необходимо тепло.
block.aquarion-atmospheric-centrifuge.name = Атмосферная центрифуга
block.aquarion-atmospheric-centrifuge.description = Разделяет компоненты воздуха центробежной силой.
block.aquarion-algal-terrace.name = Водорослевая терраса
block.aquarion-algal-terrace.description = Выращивает бактериальные колонии, которые для работы необходимо поместить на богатую питательными веществами почву.
block.aquarion-algal-terrace.details = Даже в самых суровых условиях этот вид микро-водорослей присутствует. Даже в вакууме космоса.
block.aquarion-fume-mixer.name = Смеситель дыма
block.aquarion-fume-mixer.description = Смешивает компоненты дыма, неэффективно.
block.aquarion-pump-assembly.name = Насосный узел
block.aquarion-pump-assembly.description = Извлекает большое количество жидкостей из плит под ним. Требует энергию.
block.aquarion-initialization-bay.name = Отсек инициализации
block.aquarion-initialization-bay.description = Активирует неактивные юниты, помещённые внутрь. Требует большое количество энергии.
block.aquarion-manipulation-bay.name = Отсек манипуляций
block.aquarion-manipulation-bay.description = Изменяет неактивные юниты и применяет им постоянные усиления.
block.aquarion-payload-pad.name = Площадка запуска полезной нагрузки
block.aquarion-payload-pad.description = Запускает полезные нагрузки к блокам в назначенном направлении.
block.aquarion-intialization-bay.name = Отсек инициализации
block.aquarion-intialization-bay.description = Очень быстро активирует юниты только с помощью энергии.
block.aquarion-payload-displacer.name = Отсек перемещения полезной нагрузки
block.aquarion-payload-displacer.description = Вырывает блоки из их фундамента и переносит их на сети полезной нагрузки.
block.aquarion-payload-distributor.name = Распределитель полезной нагрузки
block.aquarion-payload-distributor.description = Перемещает полезные нагрузки в нескольких направлениях.
block.aquarion-convection-heater.name = Конвекционный нагреватель
block.aquarion-convection-heater.description = Использует тепловую конвекцию воды для производства большого количества тепла.
block.aquarion-solid-heater.name = Нагреватель твердого топлива
block.aquarion-solid-heater.description = Сжигает горючие твёрдые материалы с кислородом для производства тепла.
block.aquarion-combustion-heater.name = Жидкостный нагреватель
block.aquarion-combustion-heater.description = Использует тепловые отходы жидкостного сгорания, чтобы производить небольшое количество тепла.
block.aquarion-basic-heat-exchanger.name = Теплообменник
block.aquarion-basic-heat-exchanger.description = Кипятит воду внешним теплом, производя небольшое количество энергии с остаточным теплом. Может взорваться, если пар достигнет критического уровня.
block.aquarion-thermal-cracking-unit.name = Установка термической дестиляции
block.aquarion-thermal-cracking-unit.description = Разлагает сырую нефть на более простые компоненты для дальнейшей очистки. Требует электроэнергии и тепло.
block.aquarion-acuminite-degredation-array.name = Массив разложения акуминита
block.aquarion-acuminite-degredation-array.description = Разлагает кристаллы акуминита на основные компоненты, включая стронций, алюминий и фтор.
block.aquarion-galena-crucible.name = Галеновый тигель
block.aquarion-galena-crucible.description = Разбирает кристаллы галенита на основные компоненты, включая медь, свинец и серу.
block.aquarion-spore-processor.name = Spore Processor
block.aquarion-spore-processor.description = Blends spore pods into a slurry.
block.aquarion-coal-liquefactor.name = Coal Liquefactor
block.aquarion-coal-liquefactor.description = Creates synthetic oil from coal, oxygen, and heat.
block.aquarion-solid-boiler.name = Твердотопливный бойлер
block.aquarion-solid-boiler.description = Кипятит воду, путем сжигания твердого топлива.
block.aquarion-polymer-press.name = Polymer Press
block.aquarion-polymer-press.description = Uses extreme heat and pressure to polymerize liquid petroleum.
block.aquarion-solid-boiler.details = Ожидали чего-то другого?)
block.aquarion-crate.name = Crate
block.aquarion-crate.description = Stores a small amount of resources. Unloaders are required to access these stored materials.
block.aquarion-gasifier.name = Газификатор
block.aquarion-gasifier.description = Нагревает биологическую суспензию с образованием рафинированного кокса и остаточного пара.
block.aquarion-lantern.name = Лампа
block.aquarion-lantern.description = Использует легковоспламеняющиеся жидкости или газы для производства большого количества света.
block.aquarion-deflector-well.name = Колодец отражения
block.aquarion-deflector-well.description = Использует архаичную технологию для создания щита, перенаправляющего входящие снаряды.
block.aquarion-deflector-well.details = [#3e1313]ОШИБКА ПОЛУЧЕНИЯ: ФАТАЛЬНАЯ ОШИБКА[]\n[#3e1313]Тип файла несовместим с вашим текущим программным обеспечением\nПросмотрите детали производства, чтобы получить доступ к этим данным...[]
block.aquarion-outlet.name = Энергитический вывод
block.aquarion-outlet.description = Передает подключенную энергию на блок перед ним. Требуется для энергоемких конструкций. Может потребоваться несколько блоков из-за ограниченной пропускной способности. \n Будет постоянно потреблять энергию, даже если поставляемая структура находится в автономном режиме.[]
block.aquarion-pylon.name = Энергитический пилон
block.aquarion-pylon.description = Подключает энергию к определенным структурам. Невозможно подключить к чему-либо, непосредственно потребляющему электроэнергию.
block.aquarion-pylon.details = P.S Подключается к батареям.
block.aquarion-heat-engine.name = Тепловой двигатель
block.aquarion-heat-engine.description = Использует геотермальное тепло для производства электроэнергии. Выводит шлак как побочный продукт.
block.aquarion-hydroxide-reactor.name = Гидроксидный реактор
block.aquarion-hydroxide-reactor.description = Производит умеренное количество энергии за счет пузырьков [violet]​​Гидроксида[] в [blue]Воду[]. \n Побочные продукты считаются ненужными для наших миссий и поэтому будут выбрасываться в окружающую среду.
block.aquarion-fume-engine.name = Двигатель на дыме
block.aquarion-fume-engine.description = Производит умеренное количество энергии путем сжигания [tan]Дыма[]. [scarlet]Взрываопасен.[]
block.aquarion-solar-generator.name = Солнечный генератор
block.aquarion-solar-generator.description = Производит энергию из солнечной радиации. Для запасания энергии на ночь используйте батареи.\n [scarlet]Умеренно взрывоопасны, размещайте осторожно.[]
block.aquarion-advanced-solar-generator.name = Продвинутый солнечный генератор
block.aquarion-advanced-solar-generator.description = Производит энергию от солнечной радиации и штормовых ветров. Устойчив к суровым условиям, но [scarlet] высоко взрывоопасен.[]
block.aquarion-turbine-dynamo.name = Паровая турбина
block.aquarion-turbine-dynamo.description = Производит умеренное количество энергии за счет вращения турбины с находящейся под давлением [white]пара[].
block.aquarion-capacitor-bank.name = Массив конденсаторов
block.aquarion-capacitor-bank.description = Сохраняет умеренное количество энергии. Не может подключаться к зданиям, связанным с электроснабжением, из-за близости.
block.aquarion-ion-battery.name = Ионные аккумуляторы
block.aquarion-ion-battery.description = Хранит большое количество энергии. Не может подключаться к зданиям, связанным с электроснабжением, из-за близости.
block.aquarion-siphon-tank.name = Бак
block.aquarion-siphon-tank.description = Хранит большое количество жидкости. [#c61e1e]РАСТАЕТ ПРИ ВЫСОКИХ ТЕМПЕРАТУРАХ.
block.aquarion-siphon-underflow.name = Сифонный клапан
block.aquarion-siphon-underflow.description = Отправляет жидкости на боковые входы, при невозможности отправляет их вперед. [#c61e1e]РАСТАЕТ ПРИ ВЫСОКИХ ТЕМПЕРАТУРАХ.
block.aquarion-siphon-tank.name = Сифонный бак
block.aquarion-siphon-reservoir.name = Резервуар
block.aquarion-siphon-reservoir.description = Хранит огромное количество жидкости.
block.aquarion-siphon.name = Сифон
block.aquarion-siphon.description = Перемещает жидкости вперёд. Не протекает.
block.aquarion-pulse-siphon.name = Импульсный сифон
block.aquarion-pulse-siphon.description = Перемещает жидкости вперед. Не протекает.
block.aquarion-siphon-router.name = Сифонный маршрутизатор
block.aquarion-siphon-router.description = Равномерно распределяет жидкости по всем направлениям.
block.aquarion-siphon-junction.name = Сифонный перекрёсток
block.aquarion-siphon-junction.description = Действует как мост для двух пересекающихся сифонов.
block.aquarion-siphon-bridge.name = Сифонный мост
block.aquarion-siphon-bridge.description = Может перемещать жидкости на любой местностью и зданиями. Имеет меньшую длину, чем похожие блоки
block.aquarion-pulse-siphon-bridge.name = Импульсный сифонный мост
block.aquarion-pulse-siphon-bridge.description = Может перемещать жидкости по зданиям и местности. Имеет больший радиус действия, чем его аналоги, [#c61e1e]ПЛАВИТСЯ ПРИ ВЫСОКИХ ТЕМПЕРАТУРАХ!
block.aquarion-heat-channel.name = Тепловой канал
block.aquarion-heat-channel.description = Передает тепло к блокам перед ним.
block.aquarion-cupronickel-alloying-crucible.name = Тигель для сплава медно-никеля
block.aquarion-cupronickel-alloying-crucible.description = Сплавляет медь и никель для получения медно-никеля. Требует воздух для работы. Можно ускорить теплом.
block.aquarion-brine-electrolysis-manifold.name = Коллектор электролиза рассола
block.aquarion-brine-electrolysis-manifold.description = Электролизует рассол до более чистых компонентов, таких как хлор, водород и гидроксид.
block.aquarion-fume-seperator.name = Разделитель дыма
block.aquarion-fume-seperator.description = Расщепляет [#83746b]дымы[] на некоторые его полезные компоненты.
block.aquarion-lead-burner.name = Свинцовый горелка
block.aquarion-lead-burner.description = Использует экзотермическую окислительную реакцию между свинцом и воздухом для выработки энергии.
block.aquarion-geothermal-evaporator.name = Геотермальный испаритель
block.aquarion-geothermal-evaporator.description = Использует геотермальное тепло для кипячения соляной воды, превращая её в соляную кислоту и соль.
block.aquarion-nuetralization-vessel.name = Нейтрализующий сосуд
block.aquarion-nuetralization-vessel.description = Использует нейтрализацию кислоты основным гидроксидом для получения соляной воды и тепла.
block.aquarion-scrap-centrifuge.name = Центрифуга для лома
block.aquarion-scrap-centrifuge.description = Использует центробежную силу для отделения некоторых базовых материалов из лома.
block.aquarion-ultramafic-refinery.name = Ультрамафическая рафинадия
block.aquarion-ultramafic-refinery.description = Перемалывает серпентин до его основных материалов.
block.aquarion-biotite-leaching-vessel.name = Сосуд для выщелачиваниябиотита
block.aquarion-biotite-leaching-vessel.description = Использует соляную кислоту для разложения биотита на более простые материалы.
block.aquarion-electrolysis-vat.name = Водный электролизёр
block.aquarion-electrolysis-vat.description = Использует электролиз для разделения воды на газообразные водород и кислород.
block.aquarion-meteor.name = Метеор
block.aquarion-meteor.description = Устанавливаемая ракета дальнего действия. Требует энергию для запуска.
block.aquarion-vesta.name = Веста
block.aquarion-vesta.description = Устанавливаемая ракета дальнего действия. Требует энергию для запуска.
block.aquarion-minium-reactor.name = Реактор миниума
block.aquarion-minium-reactor.description = Использует тепло мглы для разложения миниума, позволяя кислороду связываться с серой и водой. Производит свинец и витriol.
block.aquarion-ammonia-synthesizer.name = Синтезатор аммиака
block.aquarion-ammonia-synthesizer.description = Синтезирует жидкий аммиак из водорода и :nitrogen: [#ffffff]азота[].
block.aquarion-defunct-generator.name = Генератор
block.aquarion-defunct-drill.name = Бур
block.aquarion-defunct-node.name = Узел
block.aquarion-defunct-wall-small.name = Малый щит
block.aquarion-defunct-wall.name = Щит
block.aquarion-nostalgia.name = Ностальгия
block.aquarion-memorial.name = Мемориал
block.aquarion-improvised-explosive.name = Самодельное взрывное устройство
block.aquarion-improvised-explosive.description = Грубо сделанное взрывное устройство для разрушения местности. Может уничтожить некоторые материалы и постройки. Используйте с осторожностью.
## ITEMS
item.aquarion-chalkalloy.name = Chalkalloy
item.aquarion-chalkalloy.description = Metal alloy solely used by our enemies.
item.aquarion-ferrosilicon.name = Ферросилиций
item.aquarion-ferrosilicon.description = Твердый, пластичный металл, используемый для более прочных строений.
item.aquarion-ferrosilicon.details = Этот материал не такой хрупкий и реактивный, как кремний.
item.aquarion-steel.name = Сталь
item.aquarion-steel.description = Прочный углеродно-железный сплав, используемый для усиления сложных конструкций.
item.aquarion-brimstone.name = Сера
item.aquarion-brimstone.description = Реактивный, порошкообразный, желтоватый елемент используется в образовании и других реакциях.
item.aquarion-brimstone.details = Можете ли вы поверить, что ад использует это как топливо?
item.aquarion-towanite.name = Тованит
item.aquarion-towanite.description = Соединение, содержащее смесь ценных ресурсов.
item.aquarion-towanite.details = БЛЕСТЯШКА!! :D
item.aquarion-arsenic.name = Мышьяк
item.aquarion-arsenic.description = Кристаллический элемент, используемый в различных целях.
item.aquarion-arsenic.details = Если мне нельзя это есть, то почему оно выглядит таким вкусным :( крайне токсичен для органики.
item.aquarion-zinc.name = Zinc
item.aquarion-zinc.description = Хрупкий металлический элемент, похожий на магний, устойчивый к коррозии.
item.aquarion-biotite.name = Биотит
item.aquarion-biotite.description = Минерал слюдяной группы, встречающийся в магматических и метаморфических породах. Содержит оксид железа и алюминий.
item.aquarion-biotite.details = По составу кажется, что в основном это аннит, филоcиликатный минерал с гидроксильной группой, которую можно переработать в гидроксид.
item.aquarion-bauxite.name = Боксит
item.aquarion-bauxite.description = Неоднородный материал содержащий алюминий и кремнезём. Используется для базового строительства и переработки.
item.aquarion-bauxite.details = Обычно его не обнаруживают в вулканическом материале, но из-за инцидента, связанного с определенными микроорганизмами, это является нормой.
item.aquarion-ceramic.name = Керамика
item.aquarion-ceramic.description = Хрупкий, похожий на стекло, материал с высокой теплоёмкостью. Используется как базовый стройматериал и боеприпасы для шрапнельного оружия.
item.aquarion-nickel.name = Никель
item.aquarion-nickel.description = Ферромагнитный, ковкий материал использующийся для базового строительства и боеприпасов. Используется для различной переработки.
item-aquarion-nickel.details = Не надо это лизать!
item.aquarion-ferric-matter.name = Железная порода
item.aquarion-ferric-matter.description = Очень прочный металл, склонный к коррозии, много где используется.
item.aquarion-ferric-matter.details = Железо, чего вы ожидали? Просто более лаконичное название
item.aquarion-azurite.name = Азурит
item.aquarion-azurite.description = Кристаллическое соединение, содержащее большое количество меди и незначительное количество гидроксида.
item.aquarion-azurite.details = Голубая каменнистая конфета.
item.aquarion-aluminum.name = Алюминий
item.aquarion-aluminum.description = Прочный металл, используемый для выплавки, изготовления боеприпасов и конструкций.
item.aquarion-aluminum.details = НЕ АЛЮМИНЬ, А АЛЮМИНИЙ.
item.aquarion-magnesium-powder.name = Магниевый порошок
item.aquarion-magnesium-powder.description = Сильнорефактивный порошковый магний. Используется для сплавов.
item.aquarion-magnesium-powder.details = Может пригодиться в оболочках реакторов...
item.aquarion-minium.name = Миниум
item.aquarion-minium.description = Оксид свинца(II), крайне токсичен для большинства органических форм жизни. Полезен в нескольких химических реакциях.
item.aquarion-minium.details = Красный свинец, оксид свинца(I), литаргус, масикот, свинцовый оксид.
item.aquarion-serpentine.name = Серпантин
item.aquarion-serpentine.description = Неорганический ультрамафический минерал, содержащий железо, алюминий, кремний и магний.
item.aquarion-polymer.name = Полимер
item.aquarion-polymer.description = Пластид на основе органики, используется в конструкциях и производстве юнитов.
item.aquarion-manganese.name = Марганец
item.aquarion-manganese.description = Хрупкий элемент, используемый в инфраструктуре, боеприпасах и выплавке.
item.aquarion-galena.name = Галенит
item.aquarion-galena.description = Кристалл, содержащий медь, свинец и серу.
item.aquarion-sodium.name = Натрий
item.aquarion-sodium.description = Мягкий реактивный элемент, используемый для теплообмена и получения кислотных соединений.
item.aquarion-salt.name = Соль
item.aquarion-salt.description = Минерал, содержащий [#86abc3]натрий[] и [#e1ea59]хлорид[].
item.aquarion-salt.details = Образуется, когда кислота и основание нейтрализуют друг друга. Собственно, хлорид натрия NaCl.
item.aquarion-acuminite.name = Акаманит
item.aquarion-acuminite.description = Кристалл, содержащий множество различных полезных элементов, включая алюминий, фтор и стронций.
item.aquarion-strontium.name = Стронций
item.aquarion-strontium.description = Высоко реактивный и магнитный элемент, используемый для конструкций, боеприпасов и выплавки.
item.aquarion-cupronickel.name = Медно-никелевый сплав
item.aquarion-cupronickel.description = Пластичный металл с высокой теплоустойчивостью. Используется для широкого круга задач.
item.aquarion-uranium.name = Уран
item.aquarion-radium.name = Радий
item.aquarion-pitchblende.name = Питчбленд

## LIQUIDS
liquid.aquarion-brine.name = Соляной раствор
liquid.aquarion-brine.description = Концентрированный соляной раствор, используемый для переработки соли. Требуется для производства [#d377f0]гидроксида[].
liquid.aquarion-brine.details = Я даже не могу сделать из этого соленья! Отвратительно!!
liquid.aquarion-hydroxide.name = Гидроксид
liquid.aquarion-hydroxide.description = Химически активный щелочной раствор используемый для производства энергии и переработки.
liquid.aquarion-hydroxide.details = Очиститель канализации! Очень хорошо нейтрализует кислоту!
liquid.aquarion-chlorine.name = Хлорид
liquid.aquarion-chlorine.description = Газообразный элемент, используется для производства [#c2dbd2]Полимера[].
liquid.aquarion-oxygen.name = Кислород
liquid.aquarion-oxygen.description = Используется для химических реакций. Побочный продукт выращивания грядок (фотосинтеза).
liquid.aquarion-magma.name = Магма
liquid.aquarion-magma.description = Расплавленная порода из сердца кровоточащей планеты.
liquid.aquarion-magma.details = СОВЕТ: Если вы слышите взрыв конвейеров, то, скорее всего, виноват он или дым.
liquid.aquarion-fumes.name = Дым 
liquid.aquarion-fumes.description = Соединение, содержащее неизвестное количество высокореактивных элементов.
liquid.aquarion-fumes.details = Я вообще понятия не имею что это такое если быть честным...
liquid.aquarion-air.name = Воздух
liquid.aquarion-air.description = Смесь газов.
liquid.aquarion-haze.name = Пар
liquid.aquarion-haze.description = Перегретый газ. Используется для выработки электроэнергии, защиты или других процессов связанных с метанном.
liquid.aquarion-halide-water.name = Галидическая вода
liquid.aquarion-halide-water.description = Вода с повышенным содержанием примесей. Многие примеси содержат газы галогенидной группы.
liquid.aquarion-petroleum.name = Керосин
